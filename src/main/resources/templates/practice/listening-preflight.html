<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Kiểm tra loa Listening | KSH', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/practice/listening-preflight.css}">
</head>
<body class="lpf-body">
<main class="lpf-shell"
      th:attr="data-audio-reference=${listeningCheckAudioReference}">
  <header class="lpf-header">
    <a class="lpf-back" th:href="${returnUrl}" aria-label="Quay lại bài test">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <strong th:text="${sectionTitle}">Phần Nghe</strong>
    <span aria-hidden="true"></span>
  </header>

  <section class="lpf-stage" aria-labelledby="lpf-title">
    <div class="lpf-copy">
      <span class="lpf-kicker">Kiểm tra thiết bị</span>
      <h1 id="lpf-title">Kiểm tra âm thanh của bạn</h1>
      <p>Hãy phát đoạn âm thanh mẫu và xác nhận bạn nghe rõ trước khi bắt đầu phần Nghe.</p>
    </div>

    <div class="lpf-player">
      <strong>Nhấn để nghe audio mẫu</strong>
      <div class="lpf-controls">
        <button type="button" class="lpf-play" data-play aria-label="Phát audio mẫu">
          <svg class="lpf-play-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 11 7-11 7z"/></svg>
          <svg class="lpf-pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14M16 5v14"/></svg>
        </button>
        <div class="lpf-track" data-track tabindex="0" role="slider" aria-label="Vị trí audio"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-disabled="true">
          <span data-progress></span>
        </div>
        <time data-time>00:00 / 00:00</time>
      </div>
      <label class="lpf-confirm">
        <input type="checkbox" data-confirm disabled>
        <span>Tôi nghe rõ đoạn âm thanh mẫu</span>
      </label>
      <p class="lpf-status" data-status role="status">Nhấn phát; khi nghe được âm thanh, hãy xác nhận để tiếp tục.</p>
    </div>

    <form method="post" th:action="${listeningPreflightAction}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button class="lpf-continue" type="submit" data-continue disabled>
        <span>Bắt đầu phần Nghe</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </form>
  </section>

  <img class="lpf-mascot" th:src="@{/images/baekho/baekho_master_64.png}"
       alt="Bạch Hổ KSH kiểm tra âm thanh">
  <audio data-audio preload="metadata" th:src="${listeningCheckAudioReference}"></audio>
</main>
<script defer th:src="@{/js/practice/listening-preflight.js}"></script>
</body>
</html>

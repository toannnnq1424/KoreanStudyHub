<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Đổi mật khẩu', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('profile')}"></header>

<main class="app-page">
  <h1>Đổi mật khẩu</h1>

  <div th:if="${passwordChanged}" class="alert alert-success">
    Đổi mật khẩu thành công. Mật khẩu mới sẽ được sử dụng cho lần đăng nhập tiếp theo.
  </div>
  <div th:if="${wrongCurrent}" class="alert alert-error">
    Mật khẩu hiện tại không đúng.
  </div>
  <div th:if="${mismatch}" class="alert alert-error">
    Mật khẩu xác nhận không khớp.
  </div>

  <div class="card" style="padding:24px;max-width:480px;">
    <form th:action="@{/change-password}" method="post" th:object="${form}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="field">
        <label class="field-label" for="currentPassword">Mật khẩu hiện tại</label>
        <div class="input-wrap">
          <input id="currentPassword" name="currentPassword" type="password" th:field="*{currentPassword}"
                 placeholder="Nhập mật khẩu hiện tại" autocomplete="current-password" required autofocus>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="newPassword">Mật khẩu mới</label>
        <div class="input-wrap">
          <input id="newPassword" name="newPassword" type="password" th:field="*{newPassword}"
                 placeholder="Ít nhất 6 ký tự" autocomplete="new-password" required>
        </div>
        <p th:if="${#fields.hasErrors('newPassword')}" class="text-danger text-xs" style="margin-top:4px;">
          Mật khẩu phải có ít nhất 6 ký tự
        </p>
      </div>

      <div class="field">
        <label class="field-label" for="confirmPassword">Xác nhận mật khẩu mới</label>
        <div class="input-wrap">
          <input id="confirmPassword" name="confirmPassword" type="password" th:field="*{confirmPassword}"
                 placeholder="Nhập lại mật khẩu mới" autocomplete="new-password" required>
        </div>
      </div>

      <button class="btn btn-primary" type="submit">Đổi mật khẩu</button>
    </form>
  </div>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>

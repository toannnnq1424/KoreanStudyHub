<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quản lý bài test', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/test-list.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/pager.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('classes')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError}"
      style="display:none;"></span>

<main class="tst-page">
  <div class="tst-toolbar">
    <h1 class="tst-page-title">Quản lý bài test</h1>
    <a class="tst-btn tst-btn-primary" th:href="@{/lecturer/tests/new}">Tạo bài test</a>
  </div>

  <section class="tst-section">
    <div class="tst-empty" th:if="${examsPage.totalElements == 0}">
      Bạn chưa tạo bài test nào.
    </div>

    <table class="tst-table" th:if="${examsPage.totalElements > 0}">
      <thead>
      <tr>
        <th>Tiêu đề</th><th>Loại</th><th>Trạng thái</th><th>Lớp</th>
        <th>Số câu</th><th>Thao tác</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="exam : ${examsPage.content}">
        <td th:text="${exam.title()}">Tên</td>
        <td><span class="tst-badge" th:classappend="'tst-badge-' + ${exam.type()}"
                  th:text="${exam.type()}">MOCK</span></td>
        <td th:text="${exam.status()}">DRAFT</td>
        <td th:text="${exam.className()}">Lớp</td>
        <td th:text="${exam.totalQuestions()}">0</td>
        <td class="tst-row-actions">
          <a th:href="@{|/lecturer/tests/${exam.id()}/edit|}">Sửa</a>
          <a th:href="@{|/lecturer/tests/${exam.id()}/preview|}">Xem trước</a>
          <a th:href="@{|/lecturer/tests/${exam.id()}/monitor|}">Theo dõi</a>
          <a th:href="@{|/lecturer/tests/${exam.id()}/submissions|}">Bài nộp</a>
        </td>
      </tr>
      </tbody>
    </table>

    <div th:replace="~{fragments/pager :: pager(${examsPage}, '/lecturer/tests', null)}"></div>
  </section>
</main>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/flashcard-common.js}"></script>
</body>
</html>

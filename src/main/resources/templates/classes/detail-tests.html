<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${clazz.name} + ' | Bài test', ~{::link.page-css})}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/test-list.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/pager.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('classes')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError}"
      style="display:none;"></span>

<div class="class-detail-layout">
    <aside th:replace="~{fragments/class-sidebar :: classSidebar(${clazz}, 'tests')}"></aside>

    <main class="col">
        <div class="tst-toolbar">
            <h1 class="detail-title" style="margin:0">Bài test của lớp</h1>
            <a class="tst-btn tst-btn-primary" th:href="@{/lecturer/tests/new}">Tạo bài test</a>
        </div>

        <div class="tst-empty" th:if="${examsPage.totalElements == 0}">
            Lớp này chưa có bài test nào.
        </div>

        <section class="detail-panel" th:if="${examsPage.totalElements > 0}">
            <table class="tst-table">
                <thead>
                <tr>
                    <th>Tiêu đề</th><th>Loại</th><th>Trạng thái</th>
                    <th>Số câu</th><th>Đóng lúc</th><th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="exam : ${examsPage.content}">
                    <td th:text="${exam.title()}">Tên</td>
                    <td><span class="tst-badge" th:classappend="'tst-badge-' + ${exam.type()}"
                              th:text="${exam.type()}">MOCK</span></td>
                    <td th:text="${exam.status()}">DRAFT</td>
                    <td th:text="${exam.totalQuestions()}">0</td>
                    <td th:text="${exam.endAt() != null ? #temporals.format(exam.endAt(), 'HH:mm dd/MM/yyyy') : '—'}">—</td>
                    <td class="tst-row-actions">
                        <a th:href="@{'/lecturer/tests/' + ${exam.id()} + '/edit'(tab='info')}">Sửa</a>
                        <a th:href="@{'/lecturer/tests/' + ${exam.id()} + '/preview'}">Xem trước</a>
                        <a th:href="@{'/lecturer/tests/' + ${exam.id()} + '/edit'(tab='monitor')}">Theo dõi</a>
                        <a th:href="@{'/lecturer/tests/' + ${exam.id()} + '/edit'(tab='submissions')}">Bài nộp</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <div th:replace="~{fragments/pager :: pager(${examsPage}, '/lecturer/classes/' + ${clazz.id} + '/tests', null)}"></div>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/flashcard-common.js}"></script>
</body>
</html>

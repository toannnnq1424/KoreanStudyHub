<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Fragment: appHeader(active)
  Authenticated app shell header with logo, nav, and user dropdown.
  Include via th:replace="~{fragments/app-header :: appHeader('section')}".

  active — the nav item to highlight (e.g. 'home', 'profile', 'classes').
  Currently shows only the active class on the matching link; new nav items
  are added in later sprints as pages are built.

  Requires main.css + app-shell.css to be loaded by the calling page.
-->
<header th:fragment="appHeader(active)" class="header">
  <a th:href="@{/}" class="header-logo">
    <div class="logo-mark">K</div>
    <div class="logo-text">KSH</div>
  </a>

  <nav class="nav">
    <a th:href="@{/}" th:classappend="${active == 'home'} ? 'active'">Trang chủ</a>
    <a th:href="@{/profile}" th:classappend="${active == 'profile'} ? 'active'">Hồ sơ</a>
    <!-- Student enrollments only — lecturers use "Lớp học" instead. -->
    <a sec:authorize="hasRole('STUDENT')"
       th:href="@{/my/classes}" th:classappend="${active == 'my-classes'} ? 'active'">Lớp của tôi</a>
    <a th:href="@{/my/flashcards}" th:classappend="${active == 'flashcards'} ? 'active'">Thẻ ghi nhớ</a>
    <div class="dropdown nav-practice-dropdown"
         sec:authorize="hasAnyRole('STUDENT','LECTURER')">
      <div class="nav-practice-trigger" th:classappend="${active == 'practice'} ? 'active'">
        <a class="nav-practice-link" th:href="@{/practice}">Luyện tập</a>
        <button type="button"
                class="nav-practice-toggle"
                data-toggle="dropdown"
                aria-haspopup="menu"
                aria-expanded="false"
                aria-label="Mở menu Luyện tập">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>
      </div>
      <div class="menu left nav-practice-menu" role="menu" aria-label="Điều hướng Luyện tập">
        <a sec:authorize="hasRole('STUDENT')" th:href="@{/practice}" class="menu-item" role="menuitem">
          Luyện tập
        </a>
        <a sec:authorize="hasRole('STUDENT')" th:href="@{/practice/progress}" class="menu-item" role="menuitem">
          Tiến độ
        </a>
        <a sec:authorize="hasRole('LECTURER')" th:href="@{/practice/manage}" class="menu-item" role="menuitem">
          Manage Test Sets
        </a>
        <a sec:authorize="hasRole('LECTURER')" th:href="@{/practice/manage/revisions}" class="menu-item" role="menuitem">
          Lịch sử sửa đổi
        </a>
        <a sec:authorize="hasRole('LECTURER')" th:href="@{/practice/manage/materials}" class="menu-item" role="menuitem">
          Kho tài nguyên
        </a>
      </div>
    </div>
    <a sec:authorize="hasAnyRole('LECTURER','HEAD','ADMIN')"
       th:href="@{/lecturer/dashboard}" th:classappend="${active == 'dashboard'} ? 'active'">Tổng quan</a>
    <a sec:authorize="hasAnyRole('LECTURER','HEAD','ADMIN')"
       th:href="@{/lecturer/classes}" th:classappend="${active == 'classes'} ? 'active'">Lớp học</a>
    <a sec:authorize="hasAnyRole('LECTURER','HEAD','ADMIN')"
       th:href="@{/lecturer/library}" th:classappend="${active == 'library'} ? 'active'">Kho học liệu</a>
    <a sec:authorize="hasRole('HEAD')"
       th:href="@{/head}" th:classappend="${active == 'head'} ? 'active'">Bộ môn</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/dashboard}" th:classappend="${active == 'admin'} ? 'active'">Quản trị</a>
  </nav>

  <div class="header-right">
    <!-- Bell dropdown (Facebook-style panel). Badge from NotificationHeaderAdvice;
         notifications.js loads recent items on open and polls unread count. -->
    <div class="dropdown header-notif" data-notif-dropdown>
      <button type="button" class="header-msg" title="Thông báo" aria-label="Thông báo"
              aria-haspopup="true" aria-expanded="false"
              data-notif-link>
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="msg-badge" data-notif-badge
              th:classappend="${(notifUnreadCount != null and notifUnreadCount > 0)} ? '' : 'is-hidden'"
              th:text="${(notifUnreadCount != null and notifUnreadCount > 99) ? '99+' : notifUnreadCount}">0</span>
      </button>
      <div class="menu right notif-panel" role="menu" aria-label="Danh sách thông báo">
        <div class="notif-panel-head">
          <span class="notif-panel-title">Thông báo</span>
        </div>
        <div class="notif-panel-body" data-notif-panel-list>
          <div class="notif-panel-loading">Đang tải…</div>
        </div>
        <a th:href="@{/my/notifications}" class="notif-panel-footer">Xem tất cả</a>
      </div>
    </div>

    <!-- Chat icon + unread badge (hidden when 0). Count comes from the
         msgUnreadCount model attribute supplied by MessagingHeaderAdvice on
         every page; messaging.js keeps it live over STOMP. -->
    <a th:href="@{/my/messages}" class="header-msg" title="Tin nhắn" aria-label="Tin nhắn"
       data-msg-link>
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      <span class="msg-badge" data-msg-badge
            th:classappend="${(msgUnreadCount != null and msgUnreadCount > 0)} ? '' : 'is-hidden'"
            th:text="${(msgUnreadCount != null and msgUnreadCount > 99) ? '99+' : msgUnreadCount}">0</span>
    </a>

    <div class="dropdown" style="position:relative;">
      <button class="user-chip" data-toggle="dropdown" type="button">
        <div class="avatar" sec:authentication="name" style="text-transform:uppercase;">?</div>
        <span class="name" sec:authentication="principal.fullName">User</span>
        <svg class="ico ico-sm caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="menu right">
        <a th:href="@{/profile}" class="menu-item">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
          Hồ sơ
        </a>
        <a th:href="@{/change-password}" class="menu-item">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="5" r="3"/></svg>
          Đổi mật khẩu
        </a>
        <div class="menu-sep"></div>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="menu-item danger">
            <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Đăng xuất
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- STOMP-over-SockJS client + messaging behavior, loaded app-wide so the
       header badge updates live on every page. messaging.js is idempotent and
       no-ops its thread wiring when no conversation UI is present. Full webjar
       paths are pinned (versions match pom.xml).
       defer: the header is early in <body>, so run these AFTER the DOM is parsed
       or messaging.js would query [data-msg-thread] before the thread exists
       (breaking realtime append + composer fetch wiring). defer preserves the
       sockjs → stomp → messaging execution order. -->
  <script th:src="@{/webjars/sockjs-client/1.5.1/sockjs.min.js}" defer></script>
  <script th:src="@{/webjars/stomp-websocket/2.3.4/stomp.min.js}" defer></script>
  <script th:src="@{/js/messaging.js}" defer></script>
  <!-- Bell panel + badge poll. Pages already load app.js for shared dropdown toggle. -->
  <script th:src="@{/js/notifications.js(v='3')}" defer></script>
</header>
</html>

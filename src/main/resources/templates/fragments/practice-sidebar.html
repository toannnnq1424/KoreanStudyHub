<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<aside th:fragment="practiceSidebar(activeItem)" class="pi-sidebar">
  <nav class="pi-sidebar-nav">
    <!-- Đề (Kho đề / Luyện tập) -->
    <a th:href="@{/practice}" class="pi-nav-item" th:classappend="${activeItem == 'library'} ? 'active'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span class="pi-nav-text">Kho đề</span>
    </a>
    
    <!-- Tiến độ học viên / Cá nhân -->
    <a th:href="@{/practice/progress}" class="pi-nav-item" th:classappend="${activeItem == 'progress'} ? 'active'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
      <span class="pi-nav-text">Tiến độ</span>
    </a>
    
    <!-- Quản lý đề (Chỉ dành cho Giảng viên / Admin) -->
    <a sec:authorize="hasAnyRole('LECTURER','HEAD','ADMIN')" th:href="@{/practice/manage}" class="pi-nav-item" th:classappend="${activeItem == 'manage'} ? 'active'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span class="pi-nav-text">Quản lý đề</span>
    </a>
    
    <!-- Lịch sử sửa đổi (Chỉ dành cho Giảng viên / Admin) -->
    <a sec:authorize="hasAnyRole('LECTURER','HEAD','ADMIN')" th:href="@{/practice/manage/revisions}" class="pi-nav-item" th:classappend="${activeItem == 'revisions'} ? 'active'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="pi-nav-text">Lịch sử sửa đổi</span>
    </a>
  </nav>
</aside>
</html>

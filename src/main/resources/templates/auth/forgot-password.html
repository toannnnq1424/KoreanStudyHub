<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quên mật khẩu', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
  <header>
    <a th:href="@{/login}" class="logo">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#1E88E5"/><path d="M16 7l8 4v6c0 4.4-3.4 7.2-8 8-4.6-.8-8-3.6-8-8v-6l8-4z" fill="#fff"/><path d="M16 11l4 2-4 2-4-2 4-2z" fill="#1E88E5"/></svg>
      KSH
    </a>
  </header>
  <main class="centered">
    <div class="auth-card">
      <h1 th:unless="${sent}">Quên mật khẩu</h1>
      <h1 th:if="${sent}">Kiểm tra email của bạn</h1>

      <div th:if="${sent}" class="alert alert-success">
        Nếu email tồn tại trong hệ thống, một liên kết đặt lại mật khẩu đã được gửi.
        Vui lòng kiểm tra hộp thư (kể cả thư rác).
      </div>

      <p th:unless="${sent}" class="text-muted text-sm" style="margin-bottom:20px;">
        Nhập email đã đăng ký, chúng tôi sẽ gửi liên kết đặt lại mật khẩu cho bạn.
      </p>

      <form th:unless="${sent}" th:action="@{/forgot-password}" method="post" th:object="${request}">
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <div class="input-wrap">
            <input id="email" name="email" type="email" th:field="*{email}"
                   placeholder="email@ksh.edu.vn" autocomplete="email" required autofocus>
          </div>
          <p th:if="${#fields.hasErrors('email')}" class="text-danger text-xs" style="margin-top:4px;">
            Vui lòng nhập email hợp lệ
          </p>
        </div>
        <button class="btn btn-primary" type="submit">Gửi liên kết đặt lại</button>
      </form>

      <p style="margin-top:16px;text-align:center;">
        <a th:href="@{/login}" class="hint" style="color:var(--primary);">← Quay lại đăng nhập</a>
      </p>
    </div>
  </main>
</div>
</body>
</html>

spring.application.name=ksh

# ====== Local secret & features config ======
# OAuth (Google) va Mail (SMTP) settings nam CHI trong application-local.properties
# (gitignored). Khi cac property do VANG MAT, Spring Boot auto-config tu back off
# sach se -> app van khoi dong binh thuong khi chua cau hinh Google/SMTP.
# Datasource credentials cung lay tu file local do.
# (Provider URI cua Google duoc Spring Boot dien tu dong qua CommonOAuth2Provider.)
spring.config.import=optional:classpath:application-local.properties
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ====== AI evaluator (OpenAI-compatible Gemini endpoint) ======
# AI evaluator settings lay tu bien moi truong / application-local.properties
openai.api-key=${OPENAI_API_KEY:}
openai.evaluator-model=${OPENAI_EVALUATOR_MODEL:models/gemini-2.5-flash}
openai.transcription-model=${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-transcribe}
openai.base-url=${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}

# Show the full PDF -> AI -> DB pipeline in the console while developing.
logging.level.com.ksh.features.practice=INFO

# ====== Upload ======
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ====== Audio / Media Storage ======
# provider: "local" (default, serve from /static/audio/) or "r2" (Cloudflare R2)
storage.provider=${STORAGE_PROVIDER:local}
storage.local.base-url=${STORAGE_LOCAL_BASE_URL:/audio}
# R2 secrets -> set in application-local.properties or env vars (NEVER commit to git)
# storage.r2.account-id=
# storage.r2.access-key=
# storage.r2.secret-key=
# storage.r2.bucket=ksh-audio
# storage.r2.public-domain=https://audio.ksh.edu.vn


# ====== Datasource (MySQL 8.0) ======
# Credential lay tu bien moi truong / application-local.properties ? KHONG hardcode secret o day
spring.datasource.url=jdbc:mysql://localhost:3306/ksh_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=sa123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== JPA / Hibernate ======
# Flyway so huu schema -> Hibernate CHI validate, KHONG tu sua bang
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Bat sang true khi can debug SQL
spring.jpa.show-sql=false

# ?? Performance tuning (Wave 1 perf audit) ??
# Batch INSERT/UPDATE statements for audit logs and bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Avoid N+1 on LAZY collections by fetching in batches when triggered
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# ====== Flyway migration ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=false
spring.flyway.validate-on-migrate=false


# ====== Thymeleaf ======
# Tat cache khi dev de thay doi template lap tuc; bat lai khi production
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ====== Server ======
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập – Korean Study Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            border: none; border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .card-left {
            background: linear-gradient(135deg, #e63946, #c1121f);
            padding: 50px 40px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; color: white;
        }
        .korean-big { font-size: 4rem; font-weight: 700; line-height: 1; }
        .card-right { background: #fff; padding: 50px 40px; }
        .form-control {
            border: 1.5px solid #e0e0e0; border-radius: 10px;
            padding: 12px 16px; font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #e63946; box-shadow: 0 0 0 3px rgba(230,57,70,0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none; border-radius: 10px; color: white;
            padding: 12px; font-size: 1rem; font-weight: 600;
            width: 100%; transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230,57,70,0.4);
            color: white;
        }
        .input-group-text {
            border: 1.5px solid #e0e0e0; border-right: none;
            background: #fafafa; border-radius: 10px 0 0 10px;
        }
        .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .alert-danger { border-radius: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
            <div class="card">
                <div class="row g-0">
                    <div class="col-md-5 card-left">
                        <div class="korean-big">한국어</div>
                        <h4 class="mt-3 fw-bold">Korean Study Hub</h4>
                        <p class="mt-2 opacity-75">Nền tảng học tiếng Hàn toàn diện dành cho bạn</p>
                        <div class="mt-4 d-flex gap-3 fs-4 opacity-75">
                            <span>📚</span><span>✏️</span><span>🎓</span>
                        </div>
                    </div>
                    <div class="col-md-7 card-right">
                        <h4 class="fw-bold mb-1">Chào mừng trở lại!</h4>
                        <p class="text-muted mb-4" style="font-size:0.9rem">Đăng nhập để tiếp tục hành trình học tập</p>

                        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2">
                            <i class="bi bi-exclamation-circle-fill"></i>
                            Email hoặc mật khẩu không đúng
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2">
                            <i class="bi bi-check-circle-fill"></i>
                            Đăng xuất thành công
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-500" style="font-weight:500">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" name="username" class="form-control" placeholder="example@email.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" style="font-weight:500">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-login">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                            </button>
                        </form>

                        <p class="text-center mt-4 mb-0 text-muted" style="font-size:0.9rem">
                            Chưa có tài khoản?
                            <a th:href="@{/register}" class="fw-600 text-decoration-none" style="color:#e63946; font-weight:600">Đăng ký ngay</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lớp của tôi', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/classes.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/student-classes.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('my-classes')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError},data-flash-info=${flashInfo}"
      style="display:none;"></span>

<main class="class-page my-classes-shell">

  <section class="panel">

    <!-- Tabs row -->
    <div class="panel-top">
      <div class="tabs">
        <button class="tab active" type="button">
          Lớp của bạn <span th:text="${rows != null ? rows.size() : 0}">0</span>
        </button>
      </div>
      <div class="panel-top-right">
        <button class="btn-ghost icon-only" id="viewToggle" type="button" aria-label="Chuyển dạng lưới">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search">
        <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        <label for="searchInput" class="sr-only">Tìm kiếm lớp học</label>
        <input type="text" id="searchInput" placeholder="Tìm kiếm..." aria-label="Tìm kiếm lớp học">
      </div>
      <div class="dropdown sort" id="sortDd" style="position:relative;">
        <button class="sort-btn" data-toggle="dropdown" type="button">
          <span id="sortLabel">Sắp xếp...</span>
          <svg class="ico ico-sm caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="menu left">
          <button class="menu-item" data-sort="Mới nhất" data-sort-key="joined-desc" type="button">Mới nhất
            <svg class="ico ico-sm check" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          </button>
          <button class="menu-item" data-sort="Cũ nhất" data-sort-key="joined-asc" type="button">Cũ nhất</button>
          <button class="menu-item" data-sort="Tên A-Z" data-sort-key="name-asc" type="button">Tên A-Z</button>
          <button class="menu-item" data-sort="Tên Z-A" data-sort-key="name-desc" type="button">Tên Z-A</button>
        </div>
      </div>
      <a class="create-btn" th:href="@{/my/classes/join}">
        <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Tham gia lớp mới
      </a>
    </div>

    <!-- List header -->
    <div class="list-head">
      <div class="col-name">Tên lớp</div>
      <div class="col">Giảng viên</div>
      <div class="col">Ngày tham gia</div>
      <div class="col"></div>
    </div>

    <!-- Class list -->
    <div class="class-list">

      <!-- Empty state when no active or pending classes -->
      <div class="empty"
           th:if="${(rows == null or rows.isEmpty()) and (pendingRows == null or pendingRows.isEmpty())}">
        Bạn chưa tham gia lớp nào. Nhấn <b>Tham gia lớp mới</b> để bắt đầu.
      </div>

      <!-- ACTIVE class rows. The whole card area is a link that opens the lessons view. -->
      <div th:each="row : ${rows}" class="class-row student-class-row"
           th:attr="data-class-id=${row.classId()},data-class-name=${row.className()},data-class-code=${row.classCode()},data-joined-at=${#temporals.format(row.joinedAt(), 'yyyy-MM-dd''T''HH:mm:ss')}">
        <a class="class-main class-main-link"
           th:href="@{|/my/classes/${row.classId()}/lessons|}"
           th:aria-label="'Mở lớp ' + ${row.className()}">
          <div class="class-thumb"
               th:style="'background:' + ${row.avatarGradient()}"
               th:text="${row.thumbLabel()}">SE</div>
          <div class="class-info">
            <h4 th:text="${row.className()}">SE1865</h4>
            <div class="class-code">
              Mã lớp &bull; <b th:text="${row.classCode()}">NILXM</b>
              <button class="copy-code" type="button" aria-label="Sao chép mã"
                      th:attr="data-code=${row.classCode()}">
                <svg class="ico ico-sm" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
            </div>
          </div>
        </a>
        <div class="stat student-stat-text" th:text="${row.lecturerName()}">Lecturer</div>
        <div class="stat student-stat-text"
             th:text="${#temporals.format(row.joinedAt(), 'dd/MM/yyyy')}">--/--/----</div>
        <div class="dropdown row-menu" style="position:relative;">
          <button class="icon-btn" data-toggle="dropdown" type="button" aria-label="Tùy chọn">
            <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
          </button>
          <div class="menu right">
            <a class="menu-item" th:href="@{|/my/classes/${row.classId()}/lessons|}">
              <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              Vào lớp
            </a>
            <div class="menu-sep"></div>
            <button class="menu-item danger" type="button"
                    data-action="leave-class"
                    th:attr="data-class-id=${row.classId()},data-class-name=${row.className()}">
              <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
              Rời khỏi lớp
            </button>
          </div>
        </div>

        <!-- Hidden per-row leave form (Thymeleaf injects CSRF, JS calls form.submit()) -->
        <form th:id="'leave-form-' + ${row.classId()}"
              th:action="@{|/my/classes/${row.classId()}/leave|}"
              method="post" class="leave-form" style="display:none;">
        </form>
      </div>

    </div>

    <!-- PENDING join requests — no deep link into class content -->
    <div class="pending-classes" th:if="${pendingRows != null and !pendingRows.isEmpty()}"
         style="margin-top:24px; padding-top:16px; border-top:1px solid #e2e8f0;">
      <h3 style="font-size:15px; font-weight:700; margin:0 0 12px;">Đang chờ duyệt
        <span th:text="'(' + ${pendingRows.size()} + ')'">(0)</span>
      </h3>
      <div class="class-list">
        <div th:each="row : ${pendingRows}" class="class-row student-class-row is-pending"
             th:attr="data-class-id=${row.classId()},data-class-name=${row.className()}">
          <div class="class-main">
            <div class="class-thumb"
                 th:style="'background:' + ${row.avatarGradient()}"
                 th:text="${row.thumbLabel()}">SE</div>
            <div class="class-info">
              <h4 th:text="${row.className()}">SE1865</h4>
              <div class="class-code">
                Mã lớp &bull; <b th:text="${row.classCode()}">NILXM</b>
                &bull; <span style="color:#B45309; font-weight:600;">đang chờ duyệt</span>
              </div>
            </div>
          </div>
          <div class="stat student-stat-text" th:text="${row.lecturerName()}">Lecturer</div>
          <div class="stat student-stat-text"
               th:text="${row.joinedAt() != null ? #temporals.format(row.joinedAt(), 'dd/MM/yyyy') : '—'}">--/--/----</div>
          <div class="stat student-stat-text" style="color:#B45309; font-weight:600;">Chờ duyệt</div>
        </div>
      </div>
    </div>
  </section>
</main>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/student-classes.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ cá nhân – Korean Study Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { font-family:'Inter',sans-serif; }
    body { background:#f0f2f5; min-height:100vh; }
    .topnav { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.2); }
    .nav-brand { color:#e63946; font-size:1.2rem; font-weight:700; }
    .content { max-width:900px; margin:0 auto; padding:32px 16px; }
    .card-box { background:#fff; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,0.06); overflow:hidden; }
    .profile-header { background:linear-gradient(135deg,#e63946,#c1121f); padding:32px; text-align:center; color:#fff; }
    .avatar-lg { width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:700; margin:0 auto 12px; border:3px solid rgba(255,255,255,0.4); }
    .nav-tabs .nav-link { color:#6b7280; font-weight:500; border:none; padding:12px 20px; }
    .nav-tabs .nav-link.active { color:#e63946; border-bottom:2px solid #e63946; background:none; }
    .tab-content { padding:28px; }
    .form-label { font-weight:500; font-size:0.9rem; color:#374151; }
    .form-control { border:1.5px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:0.9rem; }
    .form-control:focus { border-color:#e63946; box-shadow:0 0 0 3px rgba(230,57,70,0.1); }
    .btn-save { background:#e63946; border:none; color:#fff; border-radius:8px; padding:10px 24px; font-weight:600; }
    .btn-save:hover { background:#c1121f; color:#fff; }
    .info-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #f3f4f6; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:#9ca3af; font-size:0.85rem; width:130px; flex-shrink:0; }
    .info-val { color:#1a1a2e; font-size:0.9rem; font-weight:500; }
    .badge-role { font-size:0.8rem; padding:4px 12px; border-radius:20px; font-weight:600; }
    .badge-ADMIN { background:#fff0f1; color:#e63946; }
    .badge-STUDENT { background:#f0fdf4; color:#16a34a; }
    .badge-TEACHER { background:#eff6ff; color:#2563eb; }
    .badge-SUBJECT_LEADER { background:#fefce8; color:#ca8a04; }
    .alert { border-radius:10px; font-size:0.9rem; }
    .btn-back { color:rgba(255,255,255,0.7); text-decoration:none; font-size:0.88rem; }
    .btn-back:hover { color:#fff; }
    .btn-logout-nav { background:rgba(230,57,70,0.2); border:1px solid rgba(230,57,70,0.4); color:#e63946; border-radius:8px; padding:7px 16px; font-size:0.88rem; font-weight:500; cursor:pointer; }
    .btn-logout-nav:hover { background:#e63946; color:#fff; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">한국어 <span style="color:rgba(255,255,255,0.6); font-size:0.9rem; font-weight:400">Korean Study Hub</span></div>
  <div class="d-flex align-items-center gap-3">
    <a href="javascript:history.back()" class="btn-back"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn-logout-nav"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</button>
    </form>
  </div>
</nav>

<div class="content">

  <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
  </div>

  <div class="card-box">
    <!-- Header -->
    <div class="profile-header">
      <div class="avatar-lg" th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">A</div>
      <h5 class="fw-bold mb-1" th:text="${user.fullName}">Tên người dùng</h5>
      <p class="mb-2 opacity-75" th:text="${user.email}">email@example.com</p>
      <span th:class="'badge-role badge-' + ${user.role.roleName}" th:text="${user.role.roleName}"></span>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs px-4 pt-2" id="profileTab">
      <li class="nav-item">
        <a class="nav-link active" data-bs-toggle="tab" href="#info"><i class="bi bi-person me-1"></i>Thông tin</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-bs-toggle="tab" href="#edit"><i class="bi bi-pencil me-1"></i>Chỉnh sửa</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-bs-toggle="tab" href="#password"><i class="bi bi-lock me-1"></i>Đổi mật khẩu</a>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Info tab -->
      <div class="tab-pane fade show active" id="info">
        <div class="info-row">
          <span class="info-label"><i class="bi bi-person me-2 text-muted"></i>Họ và tên</span>
          <span class="info-val" th:text="${user.fullName}"></span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="bi bi-envelope me-2 text-muted"></i>Email</span>
          <span class="info-val" th:text="${user.email}"></span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="bi bi-shield me-2 text-muted"></i>Vai trò</span>
          <span th:class="'badge-role badge-' + ${user.role.roleName}" th:text="${user.role.roleName}"></span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="bi bi-circle me-2 text-muted"></i>Trạng thái</span>
          <span class="info-val" th:text="${user.status}"></span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="bi bi-calendar me-2 text-muted"></i>Ngày tạo</span>
          <span class="info-val" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm') : '—'}"></span>
        </div>
      </div>

      <!-- Edit tab -->
      <div class="tab-pane fade" id="edit">
        <form th:action="@{/profile/update}" method="post" th:object="${updateRequest}">
          <div class="mb-3">
            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
            <input type="text" th:field="*{fullName}" class="form-control" th:value="${user.fullName}" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Avatar URL</label>
            <input type="text" th:field="*{avatar}" class="form-control" placeholder="https://..." th:value="${user.avatar}">
            <div class="form-text">Nhập đường link ảnh đại diện</div>
          </div>
          <button type="submit" class="btn-save"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
        </form>
      </div>

      <!-- Password tab -->
      <div class="tab-pane fade" id="password">
        <form th:action="@{/profile/change-password}" method="post" th:object="${changePasswordRequest}">
          <div class="mb-3">
            <label class="form-label">Mật khẩu hiện tại <span class="text-danger">*</span></label>
            <input type="password" th:field="*{currentPassword}" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" th:field="*{newPassword}" class="form-control" placeholder="Ít nhất 6 ký tự" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Nhập lại mật khẩu mới" required>
          </div>
          <button type="submit" class="btn-save"><i class="bi bi-lock me-1"></i>Đổi mật khẩu</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

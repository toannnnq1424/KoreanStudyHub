<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đặt lại mật khẩu', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
  <header>
    <a th:href="@{/login}" class="logo">
      <svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#1E88E5"/><path d="M16 7l8 4v6c0 4.4-3.4 7.2-8 8-4.6-.8-8-3.6-8-8v-6l8-4z" fill="#fff"/><path d="M16 11l4 2-4 2-4-2 4-2z" fill="#1E88E5"/></svg>
      ULP
    </a>
  </header>
  <main class="centered">
    <div class="auth-card">
      <h1 th:if="${invalid}">Liên kết không hợp lệ</h1>
      <h1 th:unless="${invalid}">Đặt mật khẩu mới</h1>

      <div th:if="${invalid}" class="alert alert-error">
        Liên kết đặt lại mật khẩu không hợp lệ hoặc đã hết hạn.
        Vui lòng yêu cầu liên kết mới.
      </div>

      <p th:unless="${invalid}" class="text-muted text-sm" style="margin-bottom:20px;">
        Nhập mật khẩu mới cho tài khoản của bạn (tối thiểu 6 ký tự).
      </p>

      <form th:unless="${invalid}" th:action="@{/reset-password}" method="post" th:object="${request}">
        <input type="hidden" name="token" th:value="${token}">
        <div class="field">
          <label class="field-label" for="newPassword">Mật khẩu mới</label>
          <div class="input-wrap">
            <input id="newPassword" name="newPassword" type="password" th:field="*{newPassword}"
                   placeholder="Ít nhất 6 ký tự" autocomplete="new-password" required autofocus>
          </div>
          <p th:if="${#fields.hasErrors('newPassword')}" class="text-danger text-xs" style="margin-top:4px;">
            Mật khẩu phải có ít nhất 6 ký tự
          </p>
        </div>
        <button class="btn btn-primary" type="submit">Đặt lại mật khẩu</button>
      </form>

      <p style="margin-top:16px;text-align:center;">
        <a th:if="${invalid}" th:href="@{/forgot-password}" class="hint" style="color:var(--primary);">Yêu cầu liên kết mới</a>
        <a th:unless="${invalid}" th:href="@{/login}" class="hint" style="color:var(--primary);">← Quay lại đăng nhập</a>
      </p>
    </div>
  </main>
</div>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin | Bộ môn', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/detail-page.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/admin.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/admin-users.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/admin-departments.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('admin')}"></header>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/admin-sidebar :: adminSidebar('departments')}"></aside>

  <main class="col">
    <h1 class="detail-title">Bộ môn</h1>
    <p class="detail-sub">Quản lý bộ môn, trạng thái hoạt động và gán trưởng bộ môn.
      Gán trưởng bộ môn sẽ nâng role người dùng lên HEAD.</p>

    <span id="flash-data"
          th:attr="data-flash-success=${flashSuccess},
                   data-flash-error=${flashError}"
          style="display:none;"></span>

    <!-- Toolbar: search / status / sort / new — mirrors users-toolbar -->
    <section class="users-toolbar">
      <form method="get" th:action="@{/admin/departments}" class="users-filter-form">
        <div class="users-toolbar-row">
          <div class="users-search">
            <svg class="ico ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <label for="deptQuery" class="sr-only">Tìm theo tên hoặc mã</label>
            <input id="deptQuery" type="text" name="q"
                   th:value="${filter != null ? filter.q() : ''}"
                   placeholder="Tìm theo tên hoặc mã…"
                   aria-label="Tìm theo tên hoặc mã">
          </div>
          <select name="status" aria-label="Lọc theo trạng thái">
            <option value=""
                    th:selected="${filter == null or filter.status() == null or filter.status().isEmpty()}">
              Tất cả trạng thái
            </option>
            <option value="active"
                    th:selected="${filter != null and filter.status() == 'active'}">Hiện</option>
            <option value="inactive"
                    th:selected="${filter != null and filter.status() == 'inactive'}">Ẩn</option>
          </select>
          <select name="sort" aria-label="Sắp xếp">
            <option value="name,asc"
                    th:selected="${filter == null or filter.sort() == null or filter.sort() == 'name,asc'}">
              Tên A → Z
            </option>
            <option value="name,desc"
                    th:selected="${filter != null and filter.sort() == 'name,desc'}">Tên Z → A</option>
            <option value="code,asc"
                    th:selected="${filter != null and filter.sort() == 'code,asc'}">Mã A → Z</option>
            <option value="code,desc"
                    th:selected="${filter != null and filter.sort() == 'code,desc'}">Mã Z → A</option>
            <option value="createdAt,desc"
                    th:selected="${filter != null and filter.sort() == 'createdAt,desc'}">Mới nhất</option>
            <option value="createdAt,asc"
                    th:selected="${filter != null and filter.sort() == 'createdAt,asc'}">Cũ nhất</option>
          </select>
          <button type="submit" class="btn-ghost">Áp dụng</button>
          <a th:href="@{/admin/departments/new}" class="create-btn">
            <svg class="ico ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"/><path d="M5 12h14"/>
            </svg>
            Tạo bộ môn
          </a>
        </div>
      </form>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-table-scroll">
        <table class="admin-list-table" th:if="${departments != null and !departments.isEmpty()}">
          <thead>
            <tr>
              <th>Bộ môn</th>
              <th>Trưởng bộ môn</th>
              <th>Trạng thái</th>
              <th class="col-actions" aria-label="Thao tác"></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="row : ${departments}">
              <td>
                <a class="user-name dept-name-link"
                   th:href="@{'/admin/departments/' + ${row.id()} + '/edit'}"
                   th:text="${row.name()}">Công nghệ thông tin</a>
                <div class="user-email" th:text="${row.code()}">CNTT</div>
              </td>
              <td>
                <span th:if="${row.headLabel() != null}" th:text="${row.headLabel()}">Head</span>
                <span th:if="${row.headLabel() == null}" class="muted">Chưa gán</span>
              </td>
              <td>
                <span class="status-pill"
                      th:classappend="${row.active()} ? 'status-active' : 'status-inactive'"
                      th:text="${row.active()} ? 'Hiện' : 'Ẩn'">Hiện</span>
              </td>
              <td class="col-actions">
                <div class="dropdown row-menu" style="position:relative;">
                  <button class="icon-btn" data-toggle="dropdown" type="button" aria-label="Tuỳ chọn">
                    <svg class="ico ico-sm" viewBox="0 0 24 24" fill="currentColor">
                      <circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/>
                    </svg>
                  </button>
                  <div class="menu right">
                    <a class="menu-item"
                       th:href="@{'/admin/departments/' + ${row.id()} + '/edit'}">
                      <svg class="ico ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                      </svg>
                      Chỉnh sửa
                    </a>
                    <button class="menu-item" type="button" data-action="toggle"
                            th:attr="data-dept-id=${row.id()}">
                      <!-- eye-off when active (hide), eye when inactive (show) -->
                      <svg th:if="${row.active()}" class="ico ico-sm" viewBox="0 0 24 24" fill="none"
                           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                           aria-hidden="true">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                      </svg>
                      <svg th:unless="${row.active()}" class="ico ico-sm" viewBox="0 0 24 24" fill="none"
                           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                           aria-hidden="true">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                      </svg>
                      <span th:text="${row.active()} ? 'Ẩn bộ môn' : 'Hiện bộ môn'">Ẩn bộ môn</span>
                    </button>
                  </div>
                </div>

                <form th:id="'form-toggle-' + ${row.id()}"
                      th:action="@{'/admin/departments/' + ${row.id()} + '/toggle'}"
                      method="post" style="display:none;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div th:if="${departments == null or departments.isEmpty()}"
           class="admin-list-empty" role="status" aria-live="polite">
        Không có bộ môn nào khớp bộ lọc hiện tại.
      </div>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/admin-departments.js}"></script>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Trưởng bộ môn | Báo cáo', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/detail-page.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/admin.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/head-department.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('head')}"></header>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/head-sidebar :: headSidebar('report')}"></aside>

  <main class="col">
    <span id="flash-data"
          th:attr="data-flash-success=${flashSuccess},
                   data-flash-error=${flashError}"
          style="display:none;"></span>

    <h1 class="detail-title">Báo cáo bộ môn</h1>
    <p class="detail-sub">So sánh sĩ số và điểm trung bình theo lớp trong bộ môn.</p>

    <div th:if="${emptyDepartment}" class="admin-list-empty" role="status">
      Bạn chưa được gán bộ môn. Liên hệ quản trị viên để được chỉ định trưởng bộ môn.
    </div>

    <section class="admin-list-panel" th:if="${!emptyDepartment}">
      <div th:if="${reportRows == null or reportRows.isEmpty()}" class="admin-list-empty">
        Chưa có lớp nào thuộc bộ môn.
      </div>
      <table class="admin-list-table" th:if="${reportRows != null and !reportRows.isEmpty()}">
        <thead>
          <tr>
            <th>Mã</th>
            <th>Tên lớp</th>
            <th>SV ACTIVE</th>
            <th>Điểm TB bài kiểm tra</th>
            <th>Điểm TB bài tập</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="row : ${reportRows}">
            <td><code th:text="${row.classCode()}">CODE</code></td>
            <td th:text="${row.className()}">Tên</td>
            <td th:text="${row.activeEnrollments()}">0</td>
            <td>
              <span th:if="${row.avgTestScore() != null}"
                    th:text="${#numbers.formatDecimal(row.avgTestScore(), 1, 2)}">0.00</span>
              <span th:if="${row.avgTestScore() == null}" class="muted">—</span>
            </td>
            <td>
              <span th:if="${row.avgAssignmentScore() != null}"
                    th:text="${#numbers.formatDecimal(row.avgAssignmentScore(), 1, 2)}">0.00</span>
              <span th:if="${row.avgAssignmentScore() == null}" class="muted">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/head-department.js}"></script>
</body>
</html>

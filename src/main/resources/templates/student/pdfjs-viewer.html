<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #404040; font-family: system-ui, sans-serif; overflow: hidden; }
    #toolbar {
      display: flex; align-items: center; gap: 8px;
      background: #323639; color: #eee; padding: 8px 14px;
      position: sticky; top: 0; z-index: 10; flex-shrink: 0;
    }
    #toolbar button {
      background: #565a5e; color: #eee; border: none; padding: 5px 14px;
      border-radius: 3px; cursor: pointer; font-size: 13px; white-space: nowrap;
    }
    #toolbar button:hover { background: #787c81; }
    #toolbar button.active { background: #2563eb; }
    #toolbar .spacer { flex: 1; }
    #toolbar #page-info { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    #toolbar #page-info input { width: 48px; text-align: center; border: 1px solid #666;
      background: #424242; color: #eee; padding: 3px 4px; border-radius: 2px; font-size: 13px; }
    #toolbar #zoom-info { font-size: 13px; min-width: 45px; text-align: center; }
    #pages-container { overflow: auto; height: calc(100vh - 48px); padding: 12px 0; }
    .page-wrapper { margin: 8px auto; box-shadow: 0 2px 12px rgba(0,0,0,.5); position: relative; }
    .page-wrapper canvas { display: block; }
    #error-msg { color: #eee; text-align: center; padding: 60px 20px; display: none; }
    #error-msg a { color: #60a5fa; }

    /* Fullscreen overlay */
    #fs-overlay { display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.92); flex-direction: column; }
    #fs-overlay.active { display: flex; }
    #fs-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px;
      background: #1a1a1a; color: #eee; flex-shrink: 0; }
    #fs-toolbar button { background: #444; color: #eee; border: none; padding: 6px 16px;
      border-radius: 3px; cursor: pointer; font-size: 14px; }
    #fs-toolbar button:hover { background: #666; }
    #fs-toolbar .spacer { flex: 1; }
    #fs-container { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; }
    #fs-container canvas { box-shadow: 0 4px 24px rgba(0,0,0,.6); }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="zoom-out" title="Thu nhỏ">−</button>
    <span id="zoom-info">100%</span>
    <button id="zoom-in" title="Phóng to">+</button>
    <button id="fit-width" title="Vừa chiều rộng">Fit</button>
    <span class="spacer"></span>
    <span id="page-info">Trang <input id="page-num" type="number" min="1" value="1"> / <span id="page-count">?</span></span>
    <button id="fullscreen" title="Toàn màn hình">⛶</button>
    <button id="download" title="Tải xuống">⬇</button>
  </div>
  <div id="pages-container">
    <div id="error-msg"><p>Không thể tải PDF.</p><p><a id="fallback-link" href="#">Mở trong tab mới</a></p></div>
  </div>

  <!-- Fullscreen overlay -->
  <div id="fs-overlay">
    <div id="fs-toolbar">
      <button id="fs-prev">◂ Trang trước</button>
      <span id="fs-page-info">Trang 1 / ?</span>
      <button id="fs-next">Trang sau ▸</button>
      <button id="fs-zoom-out">−</button>
      <span id="fs-zoom-info">100%</span>
      <button id="fs-zoom-in">+</button>
      <span class="spacer"></span>
      <button id="fs-close">✕ Đóng</button>
    </div>
    <div id="fs-container"></div>
  </div>

  <script type="module" th:inline="javascript">
    /*<![CDATA[*/
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const downloadUrl = /*[[${downloadUrl}]]*/ '';
    let pdfDoc = null;
    let scale = 1.2;
    let fitWidthMode = false;
    let currentPage = 1;
    let renderedPages = new Set();
    let pageViewports = [];

    const container = document.getElementById('pages-container');
    const toolbar = document.getElementById('toolbar');
    const errorDiv = document.getElementById('error-msg');
    document.getElementById('fallback-link').href = downloadUrl;
    document.getElementById('download').onclick = () => window.open(downloadUrl, '_blank');

    // ── Fit width ─────────────────────────────────────────────────────
    async function fitWidth() {
      fitWidthMode = true;
      const w = container.clientWidth - 24;
      if (pdfDoc) {
        const page = await pdfDoc.getPage(1);
        scale = w / page.getViewport({ scale: 1 }).width;
        renderedPages.clear();
        container.innerHTML = '';
        await preComputeAllViewports();
        // Always render page 1 so something is visible immediately.
        renderPage(1);
        updateZoomLabel();
      }
    }

    function updateZoomLabel() {
      document.getElementById('zoom-info').textContent = Math.round(scale * 100) + '%';
    }

    // ── Render single page ────────────────────────────────────────────
    function renderPage(num, targetScale) {
      const s = targetScale || scale;
      pdfDoc.getPage(num).then(page => {
        const vp = page.getViewport({ scale: s });
        pageViewports[num - 1] = vp;
        let wrapper = document.getElementById('page-' + num);
        if (!wrapper) {
          wrapper = document.createElement('div');
          wrapper.id = 'page-' + num;
          wrapper.className = 'page-wrapper';
          container.appendChild(wrapper);
        }
        const canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        wrapper.innerHTML = '';
        wrapper.appendChild(canvas);
        page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        renderedPages.add(num);
      });
    }

    // ── Lazy: render pages in viewport ────────────────────────────────
    function renderVisiblePages() {
      if (!pdfDoc) return;
      const containerRect = container.getBoundingClientRect();
      const buffer = 600; // px above/below viewport to pre-render
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const wrapper = document.getElementById('page-' + i);
        if (!wrapper) {
          // Create placeholder for unrendered pages so scroll height is correct
          if (pageViewports[i - 1]) {
            const ph = document.createElement('div');
            ph.id = 'page-' + i;
            ph.className = 'page-wrapper';
            ph.style.width = pageViewports[i - 1].width + 'px';
            ph.style.height = pageViewports[i - 1].height + 'px';
            container.appendChild(ph);
          }
          continue;
        }
        const rect = wrapper.getBoundingClientRect();
        const inView = rect.bottom >= containerRect.top - buffer
                    && rect.top <= containerRect.bottom + buffer;
        if (inView && !renderedPages.has(i)) {
          renderPage(i);
        }
      }
    }

    // Pre-compute viewports at current scale to set correct scroll height
    function preComputeAllViewports() {
      const promises = [];
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        promises.push(pdfDoc.getPage(i).then(page => {
          pageViewports[i - 1] = page.getViewport({ scale });
        }));
      }
      return Promise.all(promises);
    }

    // ── PDF load ──────────────────────────────────────────────────────
    // fetch() (via PDF.js) is not a navigation, so download managers (IDM)
    // do not intercept it — no base64 embedding needed.
    pdfjsLib.getDocument({ url: downloadUrl, withCredentials: true }).promise.then(async doc => {
      pdfDoc = doc;
      document.getElementById('page-count').textContent = doc.numPages;
      await preComputeAllViewports();
      fitWidth();
    }).catch(err => {
      errorDiv.style.display = 'block';
      console.error('PDF load error:', err);
    });

    // Scroll handler
    let scrollTimer;
    container.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(renderVisiblePages, 80);
    });
    window.addEventListener('resize', () => {
      if (fitWidthMode) fitWidth();
    });

    // ── Toolbar handlers ──────────────────────────────────────────────
    document.getElementById('zoom-in').onclick = async () => {
      fitWidthMode = false;
      scale = Math.min(3, scale + 0.2);
      renderedPages.clear();
      container.innerHTML = '';
      await preComputeAllViewports();
      renderVisiblePages();
      updateZoomLabel();
    };
    document.getElementById('zoom-out').onclick = async () => {
      fitWidthMode = false;
      scale = Math.max(0.5, scale - 0.2);
      renderedPages.clear();
      container.innerHTML = '';
      await preComputeAllViewports();
      renderVisiblePages();
      updateZoomLabel();
    };
    document.getElementById('fit-width').onclick = fitWidth;
    document.getElementById('page-num').onchange = function () {
      const n = parseInt(this.value);
      if (pdfDoc && n >= 1 && n <= pdfDoc.numPages) {
        currentPage = n;
        const el = document.getElementById('page-' + n);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }
    };

    // ── Fullscreen ────────────────────────────────────────────────────
    const fsOverlay = document.getElementById('fs-overlay');
    const fsContainer = document.getElementById('fs-container');
    let fsPage = 1;
    let fsScale = 1.3;

    function renderFsPage(num) {
      fsPage = num;
      pdfDoc.getPage(num).then(page => {
        const vp = page.getViewport({ scale: fsScale });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        fsContainer.innerHTML = '';
        fsContainer.appendChild(canvas);
        page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        document.getElementById('fs-page-info').textContent = 'Trang ' + num + ' / ' + pdfDoc.numPages;
      });
    }

    document.getElementById('fullscreen').onclick = () => {
      fsScale = scale;
      fsPage = currentPage || 1;
      fsOverlay.classList.add('active');
      renderFsPage(fsPage);
      document.getElementById('fs-zoom-info').textContent = Math.round(fsScale * 100) + '%';
    };
    document.getElementById('fs-close').onclick = () => fsOverlay.classList.remove('active');
    document.getElementById('fs-prev').onclick = () => { if (fsPage > 1) renderFsPage(fsPage - 1); };
    document.getElementById('fs-next').onclick = () => { if (pdfDoc && fsPage < pdfDoc.numPages) renderFsPage(fsPage + 1); };
    document.getElementById('fs-zoom-in').onclick = () => {
      fsScale = Math.min(3, fsScale + 0.3); renderFsPage(fsPage);
      document.getElementById('fs-zoom-info').textContent = Math.round(fsScale * 100) + '%';
    };
    document.getElementById('fs-zoom-out').onclick = () => {
      fsScale = Math.max(0.5, fsScale - 0.3); renderFsPage(fsPage);
      document.getElementById('fs-zoom-info').textContent = Math.round(fsScale * 100) + '%';
    };
    document.addEventListener('keydown', e => {
      if (!fsOverlay.classList.contains('active')) return;
      if (e.key === 'Escape') fsOverlay.classList.remove('active');
      if (e.key === 'ArrowLeft' && fsPage > 1) renderFsPage(fsPage - 1);
      if (e.key === 'ArrowRight' && pdfDoc && fsPage < pdfDoc.numPages) renderFsPage(fsPage + 1);
    });
    /*]]>*/
  </script>
</body>
</html>

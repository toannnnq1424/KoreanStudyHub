<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký – Korean Study Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center; padding: 30px 0;
        }
        .card {
            border: none; border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .card-left {
            background: linear-gradient(135deg, #e63946, #c1121f);
            padding: 50px 40px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; color: white;
        }
        .korean-big { font-size: 3.5rem; font-weight: 700; }
        .step-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; text-align: left; }
        .step-num {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.25); display: flex;
            align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
        }
        .card-right { background: #fff; padding: 50px 40px; }
        .form-control {
            border: 1.5px solid #e0e0e0; border-radius: 10px;
            padding: 12px 16px; font-size: 0.95rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: #e63946; box-shadow: 0 0 0 3px rgba(230,57,70,0.15); }
        .btn-register {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none; border-radius: 10px; color: white;
            padding: 12px; font-size: 1rem; font-weight: 600;
            width: 100%; transition: all 0.3s;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230,57,70,0.4); color: white; }
        .input-group-text { border: 1.5px solid #e0e0e0; border-right: none; background: #fafafa; border-radius: 10px 0 0 10px; }
        .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .text-danger-small { color: #e63946; font-size: 0.82rem; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
            <div class="card">
                <div class="row g-0">
                    <div class="col-md-5 card-left">
                        <div class="korean-big">가입</div>
                        <h4 class="mt-3 fw-bold">Tạo tài khoản</h4>
                        <p class="mt-2 opacity-75 mb-4">Bắt đầu hành trình học tiếng Hàn ngay hôm nay!</p>
                        <div class="w-100 mt-2">
                            <div class="step-item">
                                <div class="step-num">1</div>
                                <span class="opacity-90">Điền thông tin cá nhân</span>
                            </div>
                            <div class="step-item">
                                <div class="step-num">2</div>
                                <span class="opacity-90">Xác nhận email</span>
                            </div>
                            <div class="step-item">
                                <div class="step-num">3</div>
                                <span class="opacity-90">Bắt đầu học ngay!</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-7 card-right">
                        <h4 class="fw-bold mb-1">Đăng ký tài khoản</h4>
                        <p class="text-muted mb-4" style="font-size:0.9rem">Hoàn toàn miễn phí, không cần thẻ tín dụng</p>

                        <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2" style="border-radius:10px; font-size:0.9rem">
                            <i class="bi bi-exclamation-circle-fill"></i>
                            <span th:text="${error}"></span>
                        </div>

                        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                            <div class="mb-3">
                                <label class="form-label" style="font-weight:500">Họ và tên</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                                </div>
                                <div th:if="${#fields.hasErrors('fullName')}" class="text-danger-small" th:errors="*{fullName}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" style="font-weight:500">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com">
                                </div>
                                <div th:if="${#fields.hasErrors('email')}" class="text-danger-small" th:errors="*{email}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" style="font-weight:500">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" th:field="*{password}" class="form-control" placeholder="Ít nhất 6 ký tự">
                                </div>
                                <div th:if="${#fields.hasErrors('password')}" class="text-danger-small" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" style="font-weight:500">Xác nhận mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
                                    <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Nhập lại mật khẩu">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-register">
                                <i class="bi bi-person-plus me-2"></i>Tạo tài khoản
                            </button>
                        </form>

                        <p class="text-center mt-4 mb-0 text-muted" style="font-size:0.9rem">
                            Đã có tài khoản?
                            <a th:href="@{/login}" class="text-decoration-none fw-bold" style="color:#e63946">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

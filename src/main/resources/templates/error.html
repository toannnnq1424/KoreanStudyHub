<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đã có lỗi | ULP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
  <main>
    <div style="max-width:520px;margin:80px auto;padding:0 24px;text-align:center">
      <h1 style="font-size:28px;color:var(--heading);margin-bottom:12px">Đã có lỗi xảy ra</h1>
      <p style="color:var(--muted);margin-bottom:24px"
         th:text="${message} ?: 'Vui lòng thử lại sau.'">Vui lòng thử lại sau.</p>
      <a th:href="@{/}" class="btn btn-primary" style="display:inline-flex;width:auto;padding:12px 28px">

      </a>
    </div>
  </main>
</div>
</body>
</html>

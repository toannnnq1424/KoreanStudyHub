<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="cards">
  <div class="pc-card-batch" data-catalog-batch
       th:attr="data-has-more=${catalog.hasMore()},data-next-batch=${catalog.nextBatch()}">
    <article class="pc-set-card"
             th:each="card : ${catalog.items()}"
             th:classappend="| pc-skill-${#strings.toLowerCase(card.coverSkill())}|"
             th:attr="data-set-id=${card.id()},data-attempt-state=${card.state()},
                      data-primary-skill=${card.primarySkill()},
                      data-skill-cycle=${card.skillCodes()}">
      <a class="pc-card-link"
         th:href="${card.resumeAttemptId() != null}
                  ? @{/practice/attempts/{id}(id=${card.resumeAttemptId()})}
                  : @{/practice/sets/{id}(id=${card.id()})}"
         th:attr="aria-label=|Mở ${card.title()}|">
        <div class="pc-card-visual">
          <span class="pc-state-badge"
                th:classappend="| is-${#strings.toLowerCase(card.state())}|"
                th:text="${card.stateLabel()}">Chưa bắt đầu</span>
          <span class="pc-card-scope" th:title="${card.visibilityLabel()}">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9Z"/>
              <path d="M3.6 9h16.8M3.6 15h16.8M12 3c2 2.3 3 5.3 3 9s-1 6.7-3 9c-2-2.3-3-5.3-3-9s1-6.7 3-9Z"/>
            </svg>
            <span class="sr-only" th:text="${card.visibilityLabel()}">Công khai trong KSH</span>
          </span>

          <div class="pc-card-book" aria-hidden="true">
            <span>KSH</span>
            <svg th:if="${!card.multiSkill() && card.hasSkill('LISTENING')}" viewBox="0 0 24 24">
              <path d="M4 14v-2a8 8 0 0 1 16 0v2M4 14h3v6H5a1 1 0 0 1-1-1zM20 14h-3v6h2a1 1 0 0 0 1-1z"/>
            </svg>
            <svg th:if="${!card.multiSkill() && card.hasSkill('READING')}" viewBox="0 0 24 24">
              <path d="M3 4h6a3 3 0 0 1 3 3v13a3 3 0 0 0-3-3H3zM21 4h-6a3 3 0 0 0-3 3v13a3 3 0 0 1 3-3h6z"/>
            </svg>
            <svg th:if="${!card.multiSkill() && card.hasSkill('WRITING')}" viewBox="0 0 24 24">
              <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
            </svg>
            <svg th:if="${!card.multiSkill() && card.hasSkill('SPEAKING')}" viewBox="0 0 24 24">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3M8 22h8"/>
            </svg>
            <div class="pc-card-book-icons" th:if="${card.multiSkill()}">
              <svg th:if="${card.hasSkill('LISTENING')}" viewBox="0 0 24 24">
                <path d="M4 14v-2a8 8 0 0 1 16 0v2M4 14h3v6H5a1 1 0 0 1-1-1zM20 14h-3v6h2a1 1 0 0 0 1-1z"/>
              </svg>
              <svg th:if="${card.hasSkill('READING')}" viewBox="0 0 24 24">
                <path d="M3 4h6a3 3 0 0 1 3 3v13a3 3 0 0 0-3-3H3zM21 4h-6a3 3 0 0 0-3 3v13a3 3 0 0 1 3-3h6z"/>
              </svg>
              <svg th:if="${card.hasSkill('WRITING')}" viewBox="0 0 24 24">
                <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
              </svg>
              <svg th:if="${card.hasSkill('SPEAKING')}" viewBox="0 0 24 24">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3M8 22h8"/>
              </svg>
            </div>
            <strong th:text="${card.coverLabel()}">TỔNG HỢP</strong>
            <small>BỘ LUYỆN TẬP</small>
          </div>
        </div>

        <div class="pc-card-copy">
          <h3 th:text="${card.title()}">Tên bộ đề</h3>
          <p class="pc-card-visibility" th:text="${card.visibilityLabel()}">Công khai trong KSH</p>

          <div class="pc-skill-list" th:if="${#lists.size(card.skills()) > 1}"
               aria-label="Kỹ năng trong bộ đề">
            <span th:each="skill : ${card.skills()}"
                  th:classappend="| is-${#strings.toLowerCase(skill.code())}|"
                  th:text="${skill.label()}">Đọc</span>
          </div>

          <div class="pc-card-progress-line">
            <span th:text="|${card.completedTests()}/${card.testCount()} bài test|">0/0 bài test</span>
            <span class="pc-card-skill-icons" th:attr="aria-label=|Kỹ năng: ${card.skillSummary()}|">
              <span class="is-listening"
                    th:classappend="${card.hasSkill('LISTENING')} ? ' is-active' : ''"
                    th:title="${card.hasSkill('LISTENING')} ? 'Có phần Nghe' : 'Không có phần Nghe'">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                  <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
                </svg>
              </span>
              <span class="is-reading"
                    th:classappend="${card.hasSkill('READING')} ? ' is-active' : ''"
                    th:title="${card.hasSkill('READING')} ? 'Có phần Đọc' : 'Không có phần Đọc'">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
              </span>
              <span class="is-writing"
                    th:classappend="${card.hasSkill('WRITING')} ? ' is-active' : ''"
                    th:title="${card.hasSkill('WRITING')} ? 'Có phần Viết' : 'Không có phần Viết'">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
                </svg>
              </span>
              <span class="is-speaking"
                    th:classappend="${card.hasSkill('SPEAKING')} ? ' is-active' : ''"
                    th:title="${card.hasSkill('SPEAKING')} ? 'Có phần Nói' : 'Không có phần Nói'">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                </svg>
              </span>
            </span>
          </div>
          <div class="pc-progress-track" th:if="${card.testCount() > 0}"
               th:style="|--pc-progress:${card.progressPercent()}%|"
               role="progressbar" aria-label="Tiến độ bài test"
               th:attr="aria-valuenow=${card.progressPercent()}" aria-valuemin="0" aria-valuemax="100">
            <span></span>
          </div>
        </div>
      </a>
    </article>
  </div>
</th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý tài khoản – Admin</title>
  <th:block th:replace="~{fragments/admin-layout :: css}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/admin-layout :: sidebar('users')}"></th:block>

<div class="main">
  <th:block th:replace="~{fragments/admin-layout :: topbar('👥 Quản lý tài khoản')}"></th:block>

  <div class="content">

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between mb-2">
            <div class="stat-icon" style="background:#fff0f1">👥</div>
            <span class="text-muted" style="font-size:0.78rem">Tổng</span>
          </div>
          <div class="stat-num" th:text="${totalUsers}">0</div>
          <div class="stat-label">Người dùng</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between mb-2">
            <div class="stat-icon" style="background:#f0fdf4">✅</div>
            <span class="text-success" style="font-size:0.78rem">Active</span>
          </div>
          <div class="stat-num" th:text="${activeUsers}">0</div>
          <div class="stat-label">Tài khoản hoạt động</div>
        </div>
      </div>
    </div>

    <!-- Main table card -->
    <div class="card-box">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h6 class="fw-bold mb-0">Danh sách tài khoản</h6>
        <button class="btn-ksh" data-bs-toggle="modal" data-bs-target="#createModal">
          <i class="bi bi-person-plus me-1"></i>Thêm tài khoản
        </button>
      </div>

      <!-- Search -->
      <form th:action="@{/admin/users}" method="get" class="mb-3">
        <div class="input-group" style="max-width:400px">
          <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên hoặc email..." th:value="${keyword}">
          <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
          <a th:href="@{/admin/users}" class="btn btn-outline-danger">✕</a>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Họ tên</th>
              <th>Email</th>
              <th>Vai trò</th>
              <th>Trạng thái</th>
              <th>Ngày tạo</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u, stat : ${users}">
              <td th:text="${stat.index + 1}" class="text-muted"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="avatar-sm" th:text="${#strings.substring(u.fullName, 0, 1).toUpperCase()}">A</div>
                  <span th:text="${u.fullName}" class="fw-500"></span>
                </div>
              </td>
              <td th:text="${u.email}" class="text-muted"></td>
              <td>
                <span th:class="'badge-role badge-' + ${u.role.roleName}" th:text="${u.role.roleName}"></span>
              </td>
              <td>
                <span th:class="'badge-' + ${u.status}" th:text="${u.status}"></span>
              </td>
              <td class="text-muted" style="font-size:0.85rem"
                  th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd/MM/yyyy') : '—'}"></td>
              <td>
                <div class="d-flex gap-1">
                  <!-- Toggle status -->
                  <form th:action="@{/admin/users/{id}/toggle-status(id=${u.userId})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm"
                            th:title="${u.status == 'ACTIVE' ? 'Vô hiệu hóa' : 'Kích hoạt'}"
                            th:style="${u.status == 'ACTIVE' ? 'background:#fef9c3;color:#854d0e;border:none;border-radius:6px;padding:4px 8px' : 'background:#f0fdf4;color:#166534;border:none;border-radius:6px;padding:4px 8px'}">
                      <i th:class="${u.status == 'ACTIVE' ? 'bi bi-toggle-on' : 'bi bi-toggle-off'}"></i>
                    </button>
                  </form>
                  <!-- Reset password -->
                  <form th:action="@{/admin/users/{id}/reset-password(id=${u.userId})}" method="post" class="d-inline"
                        onsubmit="return confirm('Cấp lại mật khẩu ngẫu nhiên mới và gửi qua email cho tài khoản này?')">
                    <button type="submit" class="btn btn-sm" title="Đặt lại mật khẩu"
                            style="background:#eff6ff;color:#1d4ed8;border:none;border-radius:6px;padding:4px 8px">
                      <i class="bi bi-key-fill"></i>
                    </button>
                  </form>
                  <!-- Delete -->
                  <form th:action="@{/admin/users/{id}/delete(id=${u.userId})}" method="post" class="d-inline"
                        onsubmit="return confirm('Xóa tài khoản này?')">
                    <button type="submit" class="btn btn-sm" title="Xóa"
                            style="background:#fff0f1;color:#e63946;border:none;border-radius:6px;padding:4px 8px">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
              <td colspan="7" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>Không có dữ liệu
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-3">
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:class="'page-item' + (${i == currentPage} ? ' active' : '')">
              <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}"></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

  </div>
</div>

<!-- Create User Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold"><i class="bi bi-person-plus me-2"></i>Thêm tài khoản mới</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/users/create}" method="post" th:object="${createRequest}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-500">Họ và tên <span class="text-danger">*</span></label>
            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Email <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="email@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Mật khẩu <span class="text-danger">*</span></label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Ít nhất 6 ký tự" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Vai trò <span class="text-danger">*</span></label>
            <select th:field="*{roleName}" class="form-select" required>
              <option value="">-- Chọn vai trò --</option>
              <option th:each="r : ${roles}" th:value="${r.roleName}" th:text="${r.roleName}"></option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" class="btn-ksh px-4">Tạo tài khoản</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

spring.application.name=ksh

# ====== Local secret & features config ======
# OAuth (Google) va Mail (SMTP) settings nam CHI trong application-local.properties
# (gitignored). Khi cac property do VANG MAT, Spring Boot auto-config tu back off
# sach se -> app van khoi dong binh thuong khi chua cau hinh Google/SMTP.
# Datasource credentials cung lay tu file local do.
# (Provider URI cua Google duoc Spring Boot dien tu dong qua CommonOAuth2Provider.)
spring.config.import=optional:classpath:application-local.properties
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ====== AI evaluator (OpenAI-compatible Gemini endpoint) ======
# AI evaluator settings lay tu bien moi truong / application-local.properties
openai.api-key=${OPENAI_API_KEY:}
openai.evaluator-model=${OPENAI_EVALUATOR_MODEL:models/gemini-2.5-flash}
openai.transcription-model=${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-transcribe}
openai.base-url=${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}

# ====== Speaking transcription (8E-B, disabled by default) ======
# Separate from the Gemini/OpenAI-compatible evaluator config above.
app.practice.speaking-transcription.enabled=${PRACTICE_SPEAKING_TRANSCRIPTION_ENABLED:false}
app.practice.speaking-transcription.provider=${PRACTICE_SPEAKING_TRANSCRIPTION_PROVIDER:openai}
app.practice.speaking-transcription.base-url=${OPENAI_TRANSCRIPTION_BASE_URL:https://api.openai.com/v1}
app.practice.speaking-transcription.api-key=${OPENAI_TRANSCRIPTION_API_KEY:}
app.practice.speaking-transcription.model=${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
app.practice.speaking-transcription.language=${OPENAI_TRANSCRIPTION_LANGUAGE:ko}
app.practice.speaking-transcription.max-bytes=${PRACTICE_SPEAKING_TRANSCRIPTION_MAX_BYTES:26214400}
app.practice.speaking-transcription.timeout=${PRACTICE_SPEAKING_TRANSCRIPTION_TIMEOUT:30s}
app.practice.speaking-transcription.max-retries=${PRACTICE_SPEAKING_TRANSCRIPTION_MAX_RETRIES:2}
app.practice.speaking-transcription.include-logprobs=${PRACTICE_SPEAKING_TRANSCRIPTION_INCLUDE_LOGPROBS:true}
app.practice.speaking-transcription.allowed-mime-types=${PRACTICE_SPEAKING_TRANSCRIPTION_ALLOWED_MIME_TYPES:audio/webm,audio/mp4}

# ====== Speaking evaluator (8E-C, disabled by default) ======
# Separate evaluator config; defaults mirror the current OpenAI-compatible Gemini evaluator style.
app.practice.speaking-evaluator.enabled=${PRACTICE_SPEAKING_EVALUATOR_ENABLED:false}
app.practice.speaking-evaluator.provider=${PRACTICE_SPEAKING_EVALUATOR_PROVIDER:openai-compatible}
app.practice.speaking-evaluator.base-url=${PRACTICE_SPEAKING_EVALUATOR_BASE_URL:${openai.base-url}}
app.practice.speaking-evaluator.api-key=${PRACTICE_SPEAKING_EVALUATOR_API_KEY:${openai.api-key}}
app.practice.speaking-evaluator.model=${PRACTICE_SPEAKING_EVALUATOR_MODEL:${openai.evaluator-model}}
app.practice.speaking-evaluator.timeout=${PRACTICE_SPEAKING_EVALUATOR_TIMEOUT:30s}
app.practice.speaking-evaluator.max-retries=${PRACTICE_SPEAKING_EVALUATOR_MAX_RETRIES:2}
app.practice.speaking-evaluator.prompt-version=${PRACTICE_SPEAKING_EVALUATOR_PROMPT_VERSION:speaking-eval-v2}
app.practice.speaking-evaluator.rubric-version=${PRACTICE_SPEAKING_EVALUATOR_RUBRIC_VERSION:speaking-rubric-v1}
app.practice.speaking-evaluator.schema-version=${PRACTICE_SPEAKING_EVALUATOR_SCHEMA_VERSION:speaking-schema-v1}
app.practice.speaking-evaluator.text-fallback-enabled=${PRACTICE_SPEAKING_EVALUATOR_TEXT_FALLBACK_ENABLED:false}

# Show the full PDF -> AI -> DB pipeline in the console while developing.
logging.level.com.ksh.features.practice=INFO

# ====== Upload ======
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

# ====== Audio / Media Storage ======
# provider: "local" (default, serve from /static/audio/) or "r2" (Cloudflare R2)
storage.provider=${STORAGE_PROVIDER:local}
storage.local.base-url=${STORAGE_LOCAL_BASE_URL:/audio}
# R2 secrets -> set in application-local.properties or env vars (NEVER commit to git)
# storage.r2.account-id=
# storage.r2.access-key=
# storage.r2.secret-key=
# storage.r2.bucket=ksh-audio
# storage.r2.public-domain=https://audio.ksh.edu.vn


# ====== Datasource (MySQL 8.0) ======
# Credential lay tu bien moi truong / application-local.properties - KHONG hardcode secret o day
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ksh_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== JPA / Hibernate ======
# Flyway so huu schema -> Hibernate CHI validate, KHONG tu sua bang
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Bat sang true khi can debug SQL
spring.jpa.show-sql=false

# Performance tuning (Wave 1 perf audit)
# Batch INSERT/UPDATE statements for audit logs and bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Avoid N+1 on LAZY collections by fetching in batches when triggered
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# ====== Flyway migration ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=false
spring.flyway.validate-on-migrate=false


# ====== Thymeleaf ======
# Tat cache khi dev de thay doi template lap tuc; bat lai khi production
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ====== Server ======
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Speaking media APIs and cleanup worker remain opt-in until phase-gate approval.
app.practice.speaking-media.upload-api-enabled=${PRACTICE_SPEAKING_MEDIA_UPLOAD_API_ENABLED:false}
app.practice.speaking-media.playback-api-enabled=${PRACTICE_SPEAKING_MEDIA_PLAYBACK_API_ENABLED:false}
app.practice.speaking-media.cleanup-worker-enabled=${PRACTICE_SPEAKING_MEDIA_CLEANUP_WORKER_ENABLED:false}
app.practice.speaking-media.cleanup-worker-fixed-delay=${PRACTICE_SPEAKING_MEDIA_CLEANUP_WORKER_FIXED_DELAY:PT5M}
app.practice.speaking-media.cleanup-worker-batch-size=${PRACTICE_SPEAKING_MEDIA_CLEANUP_WORKER_BATCH_SIZE:100}

# Reading/Listening explanations are prepared after publish and generated by a bounded worker.
app.practice.explanation-generation.worker-enabled=${PRACTICE_EXPLANATION_WORKER_ENABLED:true}
app.practice.explanation-generation.initial-delay=${PRACTICE_EXPLANATION_WORKER_INITIAL_DELAY:PT20S}
app.practice.explanation-generation.fixed-delay=${PRACTICE_EXPLANATION_WORKER_FIXED_DELAY:PT30S}
app.practice.explanation-generation.provider-timeout=${PRACTICE_EXPLANATION_PROVIDER_TIMEOUT:60s}
app.practice.explanation-generation.reconcile-initial-delay=${PRACTICE_EXPLANATION_RECONCILE_INITIAL_DELAY:PT45S}
app.practice.explanation-generation.reconcile-fixed-delay=${PRACTICE_EXPLANATION_RECONCILE_FIXED_DELAY:PT2M}

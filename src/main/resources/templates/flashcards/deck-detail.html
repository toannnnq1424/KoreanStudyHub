<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${deck.title()}, ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/flashcards.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('flashcards')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError},data-flash-info=${flashInfo}"
      style="display:none;"></span>

<main class="fc-page fc-detail-page">
  <div class="fc-form-head">
    <a class="fc-back" th:href="@{/my/flashcards}">&larr; Danh sách bộ thẻ</a>
  </div>

  <section class="fc-detail-card">
    <!-- Owner edit/delete: faint icon buttons in the top-right corner. -->
    <div class="fc-detail-actions" th:if="${deck.owner()}">
      <a class="fc-icon-action" th:href="@{|/my/flashcards/${deck.id()}/edit|}"
         title="Chỉnh sửa" aria-label="Chỉnh sửa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </a>
      <form th:action="@{|/my/flashcards/${deck.id()}/delete|}" method="post"
            onsubmit="return confirm('Xoá bộ thẻ này?');">
        <button type="submit" class="fc-icon-action fc-icon-danger"
                title="Xoá bộ thẻ" aria-label="Xoá bộ thẻ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </form>
    </div>
    <h1 class="fc-detail-title" th:text="${deck.title()}">Tên bộ thẻ</h1>
    <p class="fc-detail-desc" th:if="${deck.description() != null}" th:text="${deck.description()}">Mô tả</p>
    <div class="fc-detail-meta">
      <span class="fc-badge" th:text="${deck.cardCount()} + ' thẻ'">0 thẻ</span>
      <span class="fc-badge fc-badge-shared" th:if="${deck.shared()}"
            th:text="${deck.className() != null} ? 'Chia sẻ với ' + ${deck.className()} : 'Đã chia sẻ'">Đã chia sẻ</span>
      <span class="fc-badge fc-badge-due" th:if="${dueCount > 0}"
            th:text="'Còn ' + ${dueCount} + ' thẻ đến hạn'">Đến hạn</span>
    </div>

    <!-- Study launchers -->
    <div class="fc-launchers" th:if="${deck.cardCount() > 0}">
      <a class="fc-btn fc-btn-primary" th:href="@{|/my/flashcards/${deck.id()}/flip|}">Học lật thẻ</a>
      <a class="fc-btn fc-btn-secondary" th:href="@{|/my/flashcards/${deck.id()}/review|}">Ôn tập thông minh</a>
    </div>
    <p class="fc-empty" th:if="${deck.cardCount() == 0}">Bộ thẻ chưa có thẻ nào để học.</p>

    <!-- Owner controls -->
    <div class="fc-owner-controls" th:if="${deck.owner()}">
      <!-- Share control -->
      <div class="fc-share">
        <h3 class="fc-section-title">Chia sẻ</h3>
        <form class="fc-share-form" th:action="@{|/my/flashcards/${deck.id()}/share|}" method="post"
              th:unless="${#lists.isEmpty(shareClasses)}">
          <label for="shareClass">Chia sẻ bộ thẻ tới lớp:</label>
          <select id="shareClass" name="classId">
            <option th:each="c : ${shareClasses}" th:value="${c.id()}" th:text="${c.name()}"
                    th:selected="${deck.classId() != null and deck.classId() == c.id()}">Lớp</option>
          </select>
          <button type="submit" class="fc-btn fc-btn-secondary">Chia sẻ</button>
        </form>
        <p class="fc-empty" th:if="${#lists.isEmpty(shareClasses)}">
          Bạn chưa tham gia lớp nào để chia sẻ.
        </p>
        <form th:action="@{|/my/flashcards/${deck.id()}/unshare|}" method="post" th:if="${deck.shared()}">
          <button type="submit" class="fc-btn fc-btn-ghost">Ngừng chia sẻ (chuyển về riêng tư)</button>
        </form>
      </div>
    </div>
  </section>
</main>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/flashcard-common.js}"></script>
</body>
</html>

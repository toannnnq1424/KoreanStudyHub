<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Bài tập | ' + ${clazz.name}, ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/assignments.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('classes')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError}"
      style="display:none;"></span>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/class-sidebar :: classSidebar(${clazz}, 'assignments')}"></aside>

  <main class="col">
    <h1 class="detail-title">Bài tập</h1>

    <section class="detail-panel">
      <div th:if="${#lists.isEmpty(assignments)}" class="tab-placeholder">
        <h2>Chưa có bài tập</h2>
        <p>Giảng viên chưa giao bài tập nào cho lớp này.</p>
      </div>

      <table th:unless="${#lists.isEmpty(assignments)}" class="asgn-table">
        <thead>
          <tr>
            <th>Tên bài tập</th>
            <th>Trạng thái</th>
            <th>Hạn nộp</th>
            <th>Điểm tối đa</th>
            <th>Bài của bạn</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="a : ${assignments}">
            <td th:text="${a.title}">Tên bài tập</td>
            <td>
              <span class="asgn-badge"
                    th:classappend="${a.status == 'CLOSED'} ? 'asgn-badge--closed' : 'asgn-badge--published'"
                    th:text="${a.status == 'PUBLISHED'} ? 'Đang mở' : 'Đã đóng'">
                Đang mở
              </span>
            </td>
            <td th:text="${a.dueDate != null} ? ${#temporals.format(a.dueDate, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
            <td th:text="${a.maxScore}">100</td>
            <td>
              <span th:if="${a.submissionStatus == null}" class="asgn-badge">Chưa nộp</span>
              <span th:if="${a.submissionStatus == 'DRAFT'}" class="asgn-badge">Nháp</span>
              <span th:if="${a.submissionStatus == 'SUBMITTED'}"
                    class="asgn-badge asgn-badge--draft"
                    th:classappend="${a.isLate} ? ' asgn-badge--late' : ''">
                Đã nộp<span th:if="${a.isLate}"> (muộn)</span>
              </span>
              <span th:if="${a.submissionStatus == 'GRADED'}"
                    class="asgn-badge asgn-badge--published">Đã chấm</span>
            </td>
            <td>
              <a th:href="@{/classes/{cid}/assignments/{aid}(cid=${classId},aid=${a.id})}"
                 class="btn btn-sm btn-outline">Xem</a>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/class-detail.js}"></script>
<script th:src="@{/js/assignments.js}"></script>
</body>
</html>

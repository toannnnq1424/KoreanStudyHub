<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý tài khoản – Admin</title>
  <th:block th:replace="~{fragments/admin-layout :: css}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/admin-layout :: sidebar('users')}"></th:block>

<div class="main">
  <th:block th:replace="~{fragments/admin-layout :: topbar('👥 Quản lý tài khoản')}"></th:block>

  <div class="content">

    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between mb-2">
            <div class="stat-icon" style="background:#fff0f1">👥</div>
            <span class="text-muted" style="font-size:0.78rem">Tổng</span>
          </div>
          <div class="stat-num" th:text="${totalUsers}">0</div>
          <div class="stat-label">Người dùng</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between mb-2">
            <div class="stat-icon" style="background:#f0fdf4">✅</div>
            <span class="text-success" style="font-size:0.78rem">Active</span>
          </div>
          <div class="stat-num" th:text="${activeUsers}">0</div>
          <div class="stat-label">Tài khoản hoạt động</div>
        </div>
      </div>
    </div>

    <div class="card-box">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h6 class="fw-bold mb-0">Danh sách tài khoản</h6>
        <button class="btn-ksh" data-bs-toggle="modal" data-bs-target="#createModal">
          <i class="bi bi-person-plus me-1"></i>Thêm tài khoản
        </button>
      </div>

      <!-- Search + Filter -->
      <div class="d-flex gap-2 mb-3 flex-wrap">
        <form th:action="@{/admin/users}" method="get" class="d-flex gap-2 flex-grow-1">
          <input type="hidden" name="role" th:value="${selectedRole}">
          <div class="input-group" style="max-width:380px">
            <span class="input-group-text" style="border:1.5px solid #e5e7eb; background:#fafafa"><i class="bi bi-search text-muted"></i></span>
            <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên hoặc email..." th:value="${keyword}">
          </div>
          <button class="btn-ksh px-3" type="submit">Tìm</button>
          <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-3">Reset</a>
        </form>

        <!-- Filter by role -->
        <div class="d-flex gap-1 flex-wrap">
          <a th:href="@{/admin/users}"
             th:class="'btn btn-sm ' + (${selectedRole == '' || selectedRole == null} ? 'btn-dark' : 'btn-outline-secondary')"
             style="border-radius:20px; font-size:0.82rem">Tất cả</a>
          <a th:each="r : ${roles}"
             th:href="@{/admin/users(role=${r.roleName})}"
             th:class="'btn btn-sm ' + (${selectedRole == r.roleName} ? 'btn-dark' : 'btn-outline-secondary')"
             th:text="${r.roleName}"
             style="border-radius:20px; font-size:0.82rem"></a>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Họ tên</th>
              <th>Email</th>
              <th>Vai trò</th>
              <th>Trạng thái</th>
              <th>Ngày tạo</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u, stat : ${users}">
              <td th:text="${stat.index + 1}" class="text-muted"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="avatar-sm" th:text="${#strings.substring(u.fullName, 0, 1).toUpperCase()}">A</div>
                  <span th:text="${u.fullName}" style="font-weight:500"></span>
                </div>
              </td>
              <td th:text="${u.email}" class="text-muted"></td>
              <td><span th:class="'badge-role badge-' + ${u.role.roleName}" th:text="${u.role.roleName}"></span></td>
              <td><span th:class="'badge-' + ${u.status}" th:text="${u.status}"></span></td>
              <td class="text-muted" style="font-size:0.85rem"
                  th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd/MM/yyyy') : '—'}"></td>
              <td>
                <div class="d-flex gap-1">
                  <!-- Xem chi tiết -->
                  <button class="btn btn-sm" title="Xem chi tiết"
                          style="background:#f3f4f6;color:#374151;border:none;border-radius:6px;padding:4px 8px"
                          th:attr="onclick='showDetail(' + ${u.userId} + ')'">
                    <i class="bi bi-eye-fill"></i>
                  </button>
                  <!-- Toggle status -->
                  <form th:action="@{/admin/users/{id}/toggle-status(id=${u.userId})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm"
                            th:title="${u.status == 'ACTIVE' ? 'Vô hiệu hóa' : 'Kích hoạt'}"
                            th:style="${u.status == 'ACTIVE' ? 'background:#fef9c3;color:#854d0e;border:none;border-radius:6px;padding:4px 8px' : 'background:#f0fdf4;color:#166534;border:none;border-radius:6px;padding:4px 8px'}">
                      <i th:class="${u.status == 'ACTIVE' ? 'bi bi-toggle-on' : 'bi bi-toggle-off'}"></i>
                    </button>
                  </form>
                  <!-- Reset password -->
                  <form th:action="@{/admin/users/{id}/reset-password(id=${u.userId})}" method="post" class="d-inline"
                        onsubmit="return confirm('Đặt lại mật khẩu về 123456?')">
                    <button type="submit" class="btn btn-sm" title="Đặt lại mật khẩu"
                            style="background:#eff6ff;color:#1d4ed8;border:none;border-radius:6px;padding:4px 8px">
                      <i class="bi bi-key-fill"></i>
                    </button>
                  </form>
                  <!-- Delete -->
                  <form th:action="@{/admin/users/{id}/delete(id=${u.userId})}" method="post" class="d-inline"
                        onsubmit="return confirm('Xóa tài khoản này?')">
                    <button type="submit" class="btn btn-sm" title="Xóa"
                            style="background:#fff0f1;color:#e63946;border:none;border-radius:6px;padding:4px 8px">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
              <td colspan="7" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>Không có dữ liệu
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-3">
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:class="'page-item' + (${i == currentPage} ? ' active' : '')">
              <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}"></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Xem chi tiết user -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold"><i class="bi bi-person-circle me-2"></i>Chi tiết tài khoản</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="text-center mb-4">
          <div id="detailAvatar" style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#e63946,#c1121f);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.8rem;margin:0 auto 12px"></div>
          <h6 id="detailName" class="fw-bold mb-1"></h6>
          <span id="detailRoleBadge" class="badge-role"></span>
        </div>
        <div style="background:#f9fafb;border-radius:12px;padding:16px">
          <div class="d-flex justify-content-between py-2" style="border-bottom:1px solid #f3f4f6">
            <span class="text-muted" style="font-size:0.88rem">Email</span>
            <span id="detailEmail" style="font-size:0.88rem;font-weight:500"></span>
          </div>
          <div class="d-flex justify-content-between py-2" style="border-bottom:1px solid #f3f4f6">
            <span class="text-muted" style="font-size:0.88rem">Trạng thái</span>
            <span id="detailStatus" style="font-size:0.88rem;font-weight:500"></span>
          </div>
          <div class="d-flex justify-content-between py-2">
            <span class="text-muted" style="font-size:0.88rem">Ngày tạo</span>
            <span id="detailCreatedAt" style="font-size:0.88rem;font-weight:500"></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Đóng</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Tạo user -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold"><i class="bi bi-person-plus me-2"></i>Thêm tài khoản mới</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/users/create}" method="post" th:object="${createRequest}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" style="font-weight:500">Họ và tên <span class="text-danger">*</span></label>
            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight:500">Email <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="email@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight:500">Mật khẩu <span class="text-danger">*</span></label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Ít nhất 6 ký tự" required>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight:500">Vai trò <span class="text-danger">*</span></label>
            <select th:field="*{roleName}" class="form-select" required>
              <option value="">-- Chọn vai trò --</option>
              <option th:each="r : ${roles}" th:value="${r.roleName}" th:text="${r.roleName}"></option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" class="btn-ksh px-4">Tạo tài khoản</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showDetail(userId) {
  fetch('/admin/users/' + userId + '/detail')
    .then(r => r.json())
    .then(d => {
      document.getElementById('detailAvatar').textContent = d.fullName.charAt(0).toUpperCase();
      document.getElementById('detailName').textContent = d.fullName;
      document.getElementById('detailEmail').textContent = d.email;
      document.getElementById('detailCreatedAt').textContent = d.createdAt ? d.createdAt.substring(0,10) : '—';

      const roleBadge = document.getElementById('detailRoleBadge');
      roleBadge.textContent = d.role;
      roleBadge.className = 'badge-role badge-' + d.role;

      const statusEl = document.getElementById('detailStatus');
      statusEl.textContent = d.status;
      statusEl.style.color = d.status === 'ACTIVE' ? '#16a34a' : '#9ca3af';

      new bootstrap.Modal(document.getElementById('detailModal')).show();
    });
}
</script>
</body>
</html>

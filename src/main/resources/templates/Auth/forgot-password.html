<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu – Korean Study Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { font-family:'Inter',sans-serif; }
    body { min-height:100vh; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); display:flex; align-items:center; justify-content:center; }
    .card { border:none; border-radius:20px; box-shadow:0 25px 60px rgba(0,0,0,0.4); overflow:hidden; max-width:420px; width:100%; }
    .card-header-ksh { background:linear-gradient(135deg,#e63946,#c1121f); padding:32px; text-align:center; color:#fff; }
    .card-body-ksh { background:#fff; padding:32px; }
    .form-control { border:1.5px solid #e5e7eb; border-radius:10px; padding:11px 14px; }
    .form-control:focus { border-color:#e63946; box-shadow:0 0 0 3px rgba(230,57,70,0.1); }
    .btn-main { background:linear-gradient(135deg,#e63946,#c1121f); border:none; border-radius:10px; color:#fff; padding:12px; font-weight:600; width:100%; }
    .btn-main:hover { color:#fff; transform:translateY(-1px); box-shadow:0 6px 16px rgba(230,57,70,0.3); }
    .input-group-text { border:1.5px solid #e5e7eb; border-right:none; background:#fafafa; border-radius:10px 0 0 10px; }
    .input-group .form-control { border-left:none; border-radius:0 10px 10px 0; }
    .alert { border-radius:10px; font-size:0.9rem; }
  </style>
</head>
<body>
<div class="container px-3">
  <div class="d-flex justify-content-center">
    <div class="card w-100" style="max-width:420px">
      <div class="card-header-ksh">
        <div style="font-size:2.5rem; margin-bottom:8px">🔑</div>
        <h5 class="fw-bold mb-1">Quên mật khẩu?</h5>
        <p class="mb-0 opacity-75" style="font-size:0.9rem">Nhập email để nhận link đặt lại mật khẩu</p>
      </div>
      <div class="card-body-ksh">

        <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
        </div>

        <div th:if="${param.sent}" class="alert alert-info mb-3">
          <i class="bi bi-envelope me-2"></i>Nếu email tồn tại trong hệ thống, chúng tôi đã gửi link đặt lại mật khẩu.
        </div>

        <form th:action="@{/forgot-password}" method="post" th:object="${forgotRequest}">
          <div class="mb-4">
            <label class="form-label fw-500">Email của bạn</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com" required>
            </div>
          </div>
          <button type="submit" class="btn-main mb-3">
            <i class="bi bi-send me-2"></i>Gửi link đặt lại
          </button>
        </form>

        <p class="text-center mb-0 text-muted" style="font-size:0.88rem">
          <a th:href="@{/login}" class="text-decoration-none fw-600" style="color:#e63946">
            <i class="bi bi-arrow-left me-1"></i>Quay lại đăng nhập
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>

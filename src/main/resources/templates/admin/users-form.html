<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${mode == 'create' ? 'Admin | Tạo tài khoản' : 'Admin | Chỉnh sửa tài khoản'}, ~{::link.page-css})}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/admin.css}">
    <link class="page-css" rel="stylesheet" th:href="@{/css/admin-users.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('admin')}"></header>

<div class="class-detail-layout">
    <aside th:replace="~{fragments/admin-sidebar :: adminSidebar('users')}"></aside>

    <main class="col">
        <a th:href="@{/admin/users}" class="users-form-back">
            <svg class="ico ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
            </svg>
            Quay lại danh sách
        </a>
        <h1 class="detail-title"
            th:text="${mode == 'create' ? 'Tạo tài khoản mới' : 'Chỉnh sửa tài khoản'}">Form</h1>

        <!-- Flash drain: lets server-flashed messages (e.g. demote warning when
             the redirect lands here on validation failure) surface as toasts -->
        <span id="flash-data"
              th:attr="data-flash-success=${flashSuccess},
                   data-flash-error=${flashError},
                   data-flash-warning=${flashWarning}"
              style="display:none;"></span>

        <section class="users-form-panel">
            <form th:action="@{${formAction}}"
                  th:object="${form}"
                  method="post"
                  class="users-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-row">
                    <label for="emailInput">Email <span class="required">*</span></label>
                    <input id="emailInput" type="email" th:field="*{email}" required
                           placeholder="user@ulp.edu.vn">
                    <p class="field-error" th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}">Email lỗi</p>
                </div>

                <div class="form-row">
                    <label for="fullNameInput">Họ tên <span class="required">*</span></label>
                    <input id="fullNameInput" type="text" th:field="*{fullName}" required
                           placeholder="Nguyễn Văn A">
                    <p class="field-error" th:if="${#fields.hasErrors('fullName')}"
                       th:errors="*{fullName}">Họ tên lỗi</p>
                </div>

                <div class="form-row form-row-pair">
                    <div>
                        <label for="roleSelect">Vai trò <span class="required">*</span></label>
                        <select id="roleSelect" th:field="*{role}" required>
                            <option th:each="r : ${roles}"
                                    th:value="${r.name()}"
                                    th:text="${r.name()}">ROLE</option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('role')}"
                           th:errors="*{role}">Vai trò lỗi</p>
                    </div>
                    <div>
                        <label for="departmentSelect">Khoa</label>
                        <select id="departmentSelect" th:field="*{departmentId}">
                            <option value="">— Chưa gán —</option>
                            <option th:each="d : ${departments}"
                                    th:value="${d.id()}"
                                    th:text="${d.name() + ' (' + d.code() + ')'}">DEPT</option>
                        </select>
                    </div>
                </div>

                <div class="form-row form-row-pair">
                    <div>
                        <label for="phoneInput">Số điện thoại</label>
                        <input id="phoneInput" type="text" th:field="*{phone}" maxlength="20">
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}"
                           th:errors="*{phone}">Số điện thoại lỗi</p>
                    </div>
                    <div>
                        <label class="form-checkbox-label">
                            <input type="checkbox" th:field="*{emailVerified}">
                            <span>Đã xác minh email</span>
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <label for="bioInput">Giới thiệu</label>
                    <textarea id="bioInput" th:field="*{bio}" rows="3"></textarea>
                </div>

                <!-- Password ONLY on create -->
                <div class="form-row" th:if="${mode == 'create'}">
                    <label for="passwordInput">Mật khẩu tạm thời <span class="required">*</span></label>
                    <input id="passwordInput" type="password" th:field="*{password}" required
                           autocomplete="new-password"
                           placeholder="Nhập mật khẩu admin chọn cho user">
                    <p class="field-help">Nên thông báo mật khẩu cho người dùng qua kênh
                        an toàn. Người dùng có thể tự đổi sau khi đăng nhập lần đầu.</p>
                    <p class="field-error" th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}">Mật khẩu lỗi</p>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/users}" class="btn-ghost">Huỷ</a>
                    <button type="submit" class="btn-primary"
                            th:text="${mode == 'create' ? 'Tạo tài khoản' : 'Lưu thay đổi'}">Lưu</button>
                </div>
            </form>
        </section>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/admin-users.js}"></script>
</body>
</html>

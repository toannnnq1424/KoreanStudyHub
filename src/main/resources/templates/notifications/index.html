<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Thông báo', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/pager.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/notifications.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('notifications')}"></header>

<main class="notif-shell">
  <div class="notif-header">
    <h1 class="notif-title">Thông báo</h1>
  </div>

  <!-- Empty state -->
  <div class="notif-empty" th:if="${notifications.totalElements == 0}">
    <svg class="notif-empty-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <p>Bạn chưa có thông báo nào.</p>
  </div>

  <!-- Notification list -->
  <ul class="notif-list" th:if="${notifications.totalElements > 0}">
    <li th:each="n : ${notifications.content}"
        th:classappend="${!n.isRead()} ? 'notif-item notif-item--unread' : 'notif-item'">
      <!-- POST-Redirect-Get: submitting opens the notification and redirects to the reference. -->
      <form th:action="@{|/my/notifications/${n.id()}/open|}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="notif-btn">
          <!-- Unread indicator dot -->
          <span class="notif-dot" th:if="${!n.isRead()}" aria-label="Chưa đọc"></span>
          <span class="notif-dot notif-dot--read" th:unless="${!n.isRead()}"></span>

          <span class="notif-body">
            <span class="notif-item-title" th:text="${n.title()}">Tiêu đề thông báo</span>
            <span class="notif-item-content" th:text="${n.content()}">Nội dung thông báo</span>
            <span class="notif-item-time"
                  th:text="${#temporals.format(n.createdAt(), 'HH:mm dd/MM/yyyy')}">01/01/2025</span>
          </span>

          <!-- Arrow icon indicating this is clickable -->
          <svg class="notif-arrow ico ico-sm" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </form>
    </li>
  </ul>

  <!-- Pager -->
  <div th:replace="~{fragments/pager :: pager(${notifications}, '/my/notifications', null)}"></div>
</main>

<!-- Flash toast drain: reads flash attributes placed by the controller and fires KshToast. -->
<div id="flash-data"
     th:attr="data-flash-success=${flashSuccess}, data-flash-error=${flashError}"
     style="display:none"></div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/notifications.js}" defer></script>
</body>
</html>

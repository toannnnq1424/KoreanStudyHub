<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${clazz.name} + ' | Thành viên', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('classes')}"></header>

<span id="flash-data"
      th:attr="data-flash-success=${flashSuccess},data-flash-error=${flashError}"
      style="display:none;"></span>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/class-sidebar :: classSidebar(${clazz}, 'members')}"></aside>

  <main class="col">
    <h1 class="detail-title">Thành viên lớp học (<span th:text="${memberTotal}">0</span>)</h1>

    <section class="detail-panel">
      <!-- Toolbar -->
      <div class="m-toolbar">
        <button class="filter-btn" type="button">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Bộ lọc
          <svg class="ico ico-sm caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="m-search">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="memberSearch" type="text" placeholder="Nhập tên hoặc email để tìm kiếm"
                 aria-label="Tìm kiếm thành viên">
        </div>
        <button class="export-btn" type="button" title="Xuất danh sách" disabled>
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="add-student-btn" type="button" title="Sắp ra mắt" disabled>
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Thêm học sinh
        </button>
      </div>

      <!-- Table -->
      <table class="m-table" th:if="${memberTotal > 0}">
        <thead>
          <tr>
            <th>Họ và tên</th>
            <th class="col-school">Email</th>
            <th class="col-phone">SĐT</th>
            <th class="col-joined center">Tham gia qua</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="m : ${members}" th:attr="data-member-name=${m.fullName},data-member-email=${m.email}">
            <td>
              <div class="stu">
                <div class="avatar" th:style="'background:' + ${m.avatarGradient}"
                     th:text="${m.avatarLabel}">??</div>
                <div>
                  <div class="stu-name" th:text="${m.fullName}">Họ tên</div>
                  <div class="stu-sub" th:text="${m.email}">email</div>
                </div>
              </div>
            </td>
            <td class="col-school" th:text="${m.email}">email</td>
            <td class="col-phone" th:text="${m.displayPhone()}">—</td>
            <td class="col-joined td-center">
              <span class="pill" th:text="${m.displayJoinedVia()}">—</span>
            </td>
            <td>
              <div class="row-actions">
                <button class="act-del" type="button" title="Sắp ra mắt" disabled
                        aria-label="Xoá học sinh khỏi lớp">
                  <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Empty state -->
      <div class="m-empty" th:unless="${memberTotal > 0}">
        Chưa có học sinh nào trong lớp. Chia sẻ mã lớp
        <b th:text="${clazz.code}">CODE</b>
        để học sinh tự tham gia.
      </div>

      <!-- Pending placeholder -->
      <div class="pending">
        <h4>Chờ duyệt <span>&bull; 0</span></h4>
        <p>Yêu cầu vào lớp sẽ được hiển thị khi có học sinh tìm kiếm lớp bạn với mã lớp
          <b th:text="${clazz.code}">CODE</b>.</p>
      </div>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/class-detail.js}"></script>
</body>
</html>

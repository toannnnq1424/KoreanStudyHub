<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Trưởng bộ môn | Phân công GV', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/detail-page.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/admin.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/head-department.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('head')}"></header>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/head-sidebar :: headSidebar('assign')}"></aside>

  <main class="col">
    <span id="flash-data"
          th:attr="data-flash-success=${flashSuccess},
                   data-flash-error=${flashError}"
          style="display:none;"></span>

    <h1 class="detail-title">Phân công giảng viên</h1>
    <p class="detail-sub">Chỉ phân công giảng viên thuộc cùng bộ môn. Bộ môn của lớp không đổi.</p>

    <div th:if="${emptyDepartment}" class="admin-list-empty" role="status">
      Bạn chưa được gán bộ môn. Liên hệ quản trị viên để được chỉ định trưởng bộ môn.
    </div>

    <section class="admin-list-panel" th:if="${!emptyDepartment}">
      <div th:if="${classRows == null or classRows.isEmpty()}" class="admin-list-empty">
        Chưa có lớp nào thuộc bộ môn.
      </div>
      <table class="admin-list-table" th:if="${classRows != null and !classRows.isEmpty()}">
        <thead>
          <tr>
            <th>Mã</th>
            <th>Tên lớp</th>
            <th>GV hiện tại</th>
            <th>Phân công mới</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="row : ${classRows}">
            <td><code th:text="${row.classCode()}">CODE</code></td>
            <td th:text="${row.className()}">Tên</td>
            <td th:text="${row.lecturerName()}">GV</td>
            <td>
              <form th:action="@{'/head/assign/' + ${row.classId()}}" method="post" class="head-assign-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <select name="lecturerId" required>
                  <option th:each="l : ${lecturers}"
                          th:value="${l.id()}"
                          th:selected="${l.id() == row.lecturerId()}"
                          th:text="${l.fullName()}">GV</option>
                </select>
                <button type="submit" class="btn-primary btn-sm">Lưu</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/head-department.js}"></script>
</body>
</html>

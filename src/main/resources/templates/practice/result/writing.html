<div th:fragment="content(sec)">
  <!-- ═══ OVERVIEW ANALYSIS SECTION (PREP STYLE) ═══ -->
  <div class="pi-overview-analysis" th:id="'pi-overview-analysis-' + ${sec.sectionId()}" style="margin-top: 16px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; background: #f8fafc;">
    <h3 style="font-weight: 700; margin-bottom: 16px;">Phân tích kết quả viết từ AI</h3>

    <!-- Cấp 2 Tabs: Rubrics -->
    <div class="pi-rubric-subtabs" th:id="'pi-rubric-subtabs-' + ${sec.sectionId()}" style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;">
      <!-- Will be dynamically populated -->
    </div>

    <!-- Rubric Panel Layout -->
    <div class="pi-rubric-panel-layout" style="display: flex; gap: 20px; flex-wrap: wrap;">
      <!-- Left: Rubric details & description -->
      <div class="pi-rubric-left" style="flex: 1; min-width: 280px; background: white; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0;">
        <div class="pi-rubric-score-badge" style="display: inline-flex; align-items: baseline; gap: 4px; background: #e0f2fe; color: #0369a1; padding: 6px 12px; border-radius: 8px; font-weight: 700; margin-bottom: 12px;">
          <strong th:id="'rubric-score-val-' + ${sec.sectionId()}">8.5</strong>
          <span th:id="'rubric-score-scale-' + ${sec.sectionId()}" style="font-size: 0.8rem; opacity: 0.85;">/ 100</span>
        </div>
        <p class="pi-rubric-desc" th:id="'rubric-feedback-text-' + ${sec.sectionId()}" style="color: #475569; font-size: 0.95rem; line-height: 1.5;">
          Nhận xét chi tiết cho tiêu chí đánh giá này đang được cập nhật từ AI...
        </p>
      </div>

      <!-- Right: Slider metrics -->
      <div class="pi-rubric-right" style="flex: 1; min-width: 280px; background: white; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0;">
        <h4 th:id="'rubric-metrics-title-' + ${sec.sectionId()}" style="font-weight: 700; margin-bottom: 12px; font-size: 0.95rem;">Đánh giá tiêu chí thành phần</h4>
        
        <div class="pi-metric-sliders" th:id="'pi-metric-sliders-' + ${sec.sectionId()}">
          <!-- Will be dynamically populated with sliders -->
        </div>
      </div>
    </div>
  </div>

  <!-- Pass data to JS via dataset attribute on parent -->
  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
      const sectionId = [[${sec.sectionId()}]];
      const aiJson = [[${sec.aiFeedbackJson()}]];
      const overallScore = [[${sec.sectionScore()}]];
      
      let aiData = {};
      try {
        if (aiJson) {
          aiData = JSON.parse(aiJson);
          if (!Array.isArray(aiData.rubric_scores)) {
            const firstFeedback = Object.values(aiData).find(v => v && typeof v === 'object' && Array.isArray(v.rubric_scores));
            aiData = firstFeedback || {};
          }
        }
      } catch (e) {
        console.warn("Could not parse AI JSON feedback for section " + sectionId, e);
      }

      const rubrics = [
        { id: 'content', label: 'Nội dung & Yêu cầu', metrics: ['Mức độ hoàn thành', 'Độ rõ ràng', 'Phát triển ý'] },
        { id: 'structure', label: 'Bố cục & Liên kết', metrics: ['Mạch lạc', 'Từ nối', 'Phân đoạn'] },
        { id: 'language', label: 'Từ vựng & Ngữ pháp', metrics: ['Độ chính xác ngữ pháp', 'Từ vựng phù hợp', '띄어쓰기'] }
      ];

      // Render Rubrics Tabs
      const rubricsContainer = document.getElementById('pi-rubric-subtabs-' + sectionId);
      if (rubricsContainer) {
        rubricsContainer.innerHTML = rubrics.map((r, idx) => `
          <button class="pi-rubric-subtab-btn ${idx === 0 ? 'active' : ''}" 
                  data-id="${r.id}"
                  style="padding: 6px 12px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; font-weight: 600; cursor: pointer; font-size: 0.85rem;"
                  onclick="window.switchWritingRubric('${sectionId}', '${r.id}', this)">
            ${r.label}
          </button>
        `).join('');
      }

      window.switchWritingRubric = function(secId, rubId, btnEl) {
        // Toggle button states
        const btns = rubricsContainer.querySelectorAll('button');
        btns.forEach(b => {
          b.classList.remove('active');
          b.style.background = 'white';
          b.style.color = '#475569';
          b.style.borderColor = '#e2e8f0';
        });
        if (btnEl) {
          btnEl.classList.add('active');
          btnEl.style.background = '#7e22ce';
          btnEl.style.color = 'white';
          btnEl.style.borderColor = '#7e22ce';
        }

        const activeRubricObj = rubrics.find(r => r.id === rubId);
        let rubricList = Array.isArray(aiData.rubric_scores) ? aiData.rubric_scores : [];
        let matchedScore = null;
        let feedbackText = "";

        if (rubricList.length > 0) {
          let targetIdx = 0;
          if (rubId === 'structure') targetIdx = 1;
          else if (rubId === 'language') targetIdx = 2;
          
          const matched = rubricList[Math.min(targetIdx, rubricList.length - 1)];
          if (matched) {
            matchedScore = matched.score;
            feedbackText = matched.feedback;
          }
        }

        const hasStoredFeedback = matchedScore !== null || !!feedbackText;

        if (!feedbackText && false) {
          if (rubId === 'content') {
            feedbackText = "Nội dung bài viết cơ bản hoàn thành tốt và đầy đủ các yêu cầu đề ra. Các luận điểm chính được thể hiện rõ nét.";
          } else if (rubId === 'structure') {
            feedbackText = "Bố cục logic chặt chẽ, các liên từ chuyển mạch tương đối tự nhiên giúp bài viết mượt mà và dễ hiểu.";
          } else {
            feedbackText = "Khả năng vận dụng từ vựng đa dạng. Lưu ý chỉnh sửa một số lỗi chính tả nhỏ và khoảng cách viết (띄어쓰기) để đạt band điểm cao hơn.";
          }
        }

        if (!feedbackText) {
          feedbackText = "Không có nhận xét được lưu cho câu này.";
        }

        // Update UI elements
        const scoreVal = document.getElementById('rubric-score-val-' + secId);
        const scoreScale = document.getElementById('rubric-score-scale-' + secId);
        const feedbackEl = document.getElementById('rubric-feedback-text-' + secId);
        
        if (scoreVal) scoreVal.textContent = matchedScore === null ? "--" : (matchedScore * 10).toFixed(0);
        if (scoreScale) scoreScale.textContent = matchedScore === null ? "" : "/ 100";
        if (feedbackEl) feedbackEl.textContent = feedbackText;

        // Render Sliders
        const slidersContainer = document.getElementById('pi-metric-sliders-' + secId);
        if (matchedScore === null) {
          if (slidersContainer) slidersContainer.innerHTML = "";
          return;
        }
        if (slidersContainer) {
          const rawPercent = matchedScore * 10;
          slidersContainer.innerHTML = activeRubricObj.metrics.map((metric, idx) => {
            const variation = (idx === 0) ? 2 : (idx === 1 ? -4 : 6);
            const finalValue = Math.min(100, Math.max(20, rawPercent + variation));
            return `
              <div class="pi-slider-group" style="margin-bottom: 12px;">
                <div class="pi-slider-label" style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #475569; margin-bottom: 4px;">
                  <span>${metric}</span>
                  <span style="font-weight: 700;">${finalValue.toFixed(0)}%</span>
                </div>
                <div class="pi-slider-track" style="height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden;">
                  <div class="pi-slider-fill" style="width: ${finalValue}%; height: 100%; background: #7e22ce; border-radius: 99px;"></div>
                </div>
              </div>
            `;
          }).join('');
        }
      };

      // Run initial update for the first rubric 'content'
      const firstTabBtn = rubricsContainer.querySelector('button');
      window.switchWritingRubric(sectionId, 'content', firstTabBtn);
    });
  </script>
</div>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cài đặt hệ thống – Admin</title>
  <th:block th:replace="~{fragments/admin-layout :: css}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/admin-layout :: sidebar('settings')}"></th:block>
<div class="main">
  <th:block th:replace="~{fragments/admin-layout :: topbar('⚙️ Cài đặt hệ thống')}"></th:block>
  <div class="content">
    <div class="row g-4">
      <div class="col-md-3">
        <div class="card-box p-0" style="overflow:hidden">
          <div style="padding:16px 20px; background:#f9fafb; font-size:0.8rem; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px">Danh mục</div>
          <nav class="nav flex-column">
            <a href="#academic" class="nav-link d-flex align-items-center gap-2 px-4 py-3" style="color:#374151; border-left:3px solid #e63946; background:#fff0f1; font-weight:500; font-size:0.9rem">
              <i class="bi bi-book"></i> Học thuật
            </a>
            <a href="#notification" class="nav-link d-flex align-items-center gap-2 px-4 py-3" style="color:#6b7280; font-size:0.9rem">
              <i class="bi bi-bell"></i> Thông báo
            </a>
            <a href="#security" class="nav-link d-flex align-items-center gap-2 px-4 py-3" style="color:#6b7280; font-size:0.9rem">
              <i class="bi bi-shield-lock"></i> Bảo mật
            </a>
            <a href="#storage" class="nav-link d-flex align-items-center gap-2 px-4 py-3" style="color:#6b7280; font-size:0.9rem">
              <i class="bi bi-hdd"></i> Lưu trữ
            </a>
          </nav>
        </div>
      </div>
      <div class="col-md-9">
        <!-- Academic settings -->
        <div class="card-box mb-4" id="academic">
          <h6 class="fw-bold mb-4"><i class="bi bi-book me-2 text-muted"></i>Cài đặt học thuật</h6>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Tên hệ thống</label>
              <input type="text" class="form-control" value="Korean Study Hub">
            </div>
            <div class="col-md-6">
              <label class="form-label">Ngôn ngữ mặc định</label>
              <select class="form-select">
                <option selected>Tiếng Việt</option>
                <option>English</option>
                <option>한국어</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Số bài học tối đa mỗi lớp</label>
              <input type="number" class="form-control" value="50">
            </div>
            <div class="col-md-6">
              <label class="form-label">Điểm đạt tối thiểu (%)</label>
              <input type="number" class="form-control" value="60">
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
                <label class="form-check-label" style="font-size:0.9rem">Cho phép học sinh tự đăng ký lớp học</label>
              </div>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
                <label class="form-check-label" style="font-size:0.9rem">Bật tính năng diễn đàn thảo luận</label>
              </div>
            </div>
          </div>
          <div class="mt-4">
            <button class="btn-ksh px-4"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
          </div>
        </div>

        <!-- Notification settings -->
        <div class="card-box mb-4" id="notification">
          <h6 class="fw-bold mb-4"><i class="bi bi-bell me-2 text-muted"></i>Cài đặt thông báo</h6>
          <div class="row g-3">
            <div class="col-12">
              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" checked>
                <label class="form-check-label" style="font-size:0.9rem">Thông báo khi có bài kiểm tra mới</label>
              </div>
              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" checked>
                <label class="form-check-label" style="font-size:0.9rem">Thông báo khi tài nguyên được duyệt</label>
              </div>
              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label" style="font-size:0.9rem">Thông báo diễn đàn</label>
              </div>
            </div>
          </div>
          <button class="btn-ksh px-4 mt-2"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
        </div>

        <!-- Security settings -->
        <div class="card-box" id="security">
          <h6 class="fw-bold mb-4"><i class="bi bi-shield-lock me-2 text-muted"></i>Cài đặt bảo mật</h6>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Độ dài mật khẩu tối thiểu</label>
              <input type="number" class="form-control" value="6">
            </div>
            <div class="col-md-6">
              <label class="form-label">Thời gian hết phiên (phút)</label>
              <input type="number" class="form-control" value="60">
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label" style="font-size:0.9rem">Bật xác thực 2 bước</label>
              </div>
            </div>
          </div>
          <button class="btn-ksh px-4 mt-4"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

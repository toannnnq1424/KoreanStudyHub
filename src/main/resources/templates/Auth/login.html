<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<div th:if="${param.error}">
    Invalid email or password
</div>

<div th:if="${param.logout}">
    Logout successful
</div>

<form th:action="@{/login}"
      method="post">

    <div>
        <label>Email</label>

        <input type="email"
               name="username">
    </div>

    <div>
        <label>Password</label>

        <input type="password"
               name="password">
    </div>

    <button type="submit">
        Login
    </button>

    <p>
        Don't have an account?
        <a th:href="@{/register}">
            Register here
        </a>
    </p>

</form>

</body>
</html>

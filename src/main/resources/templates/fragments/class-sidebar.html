<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<!--
  Fragment: classSidebar(clazz, activeTab)
    clazz     : ClassEntity hien dang xem
    activeTab : 'board' | 'schedule' | 'members' | 'roles' | 'groups' |
                'assignments' | 'scores' | 'lessons' | 'materials' | 'settings'

  Render mot card sidebar 280px (cot trai layout chi tiet lop): info lop,
  share link, nav 9 muc + button "Cai dat lop hoc" o footer.

  Yeu cau: main.css + app-shell.css + class-detail.css da load truoc.
-->
<aside th:fragment="classSidebar(clazz, activeTab)" class="col">
  <div class="side">
    <div class="class-head">
      <div class="class-name" th:text="${clazz.name}">SE1865</div>
      <div class="class-ma">Mã lớp: <b th:text="${clazz.code}">NILXM</b></div>

      <div class="share-box">
        <div class="share-label">Chia sẻ lớp học</div>
        <div class="share-row" th:if="${activeCode != null}">
          <span class="share-row-label">Mã mời</span>
          <code class="share-row-value" th:text="${activeCode.code()}">CODE</code>
          <button class="share-copy-btn" type="button"
                  th:attr="data-copy=${activeCode.code()}"
                  data-copy-label="mã mời"
                  aria-label="Sao chép mã mời"
                  title="Sao chép mã mời">
            <svg class="ico ico-sm" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>

        <div class="share-row" th:if="${activeLink != null}">
          <span class="share-row-label">Liên kết</span>
          <button class="share-copy-btn share-copy-link" type="button"
                  th:attr="data-copy=${activeLink.fullUrl()}"
                  data-copy-label="liên kết mời"
                  aria-label="Sao chép liên kết mời"
                  title="Sao chép liên kết mời">
            <svg class="ico ico-sm" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Sao chép link
          </button>
        </div>


        <div class="desc-row">
          <svg class="ico ico-sm" viewBox="0 0 24 24">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
            <line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          <span th:text="${clazz.description != null and !clazz.description.isEmpty()} ? ${clazz.description} : 'Mô tả cho lớp học'">Mô tả cho lớp học</span>
        </div>
      </div>
    </div>

    <div class="side-sep"></div>
    <p class="menu-title">Danh mục</p>

    <ul class="side-nav">
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/board'}"
           th:classappend="${activeTab == 'board'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Bảng tin
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/schedule'}"
           th:classappend="${activeTab == 'schedule'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Lịch học
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/members'}"
           th:classappend="${activeTab == 'members'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Thành viên
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/roles'}"
           th:classappend="${activeTab == 'roles'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6"/></svg>Vai trò lớp
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/groups'}"
           th:classappend="${activeTab == 'groups'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>Nhóm học tập
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/assignments'}"
           th:classappend="${activeTab == 'assignments'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Bài tập
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/scores'}"
           th:classappend="${activeTab == 'scores'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Bảng điểm
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/lessons'}"
           th:classappend="${activeTab == 'lessons'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Bài giảng
        </a>
      </li>
      <li>
        <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/materials'}"
           th:classappend="${activeTab == 'materials'} ? 'active' : ''">
          <svg class="ico ico-sm" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Tài liệu
        </a>
      </li>
    </ul>

    <div class="side-foot">
      <a th:href="@{'/lecturer/classes/' + ${clazz.id} + '/settings'}"
         class="settings-btn"
         th:classappend="${activeTab == 'settings'} ? 'active' : ''">
        <svg class="ico ico-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Cài đặt lớp học
      </a>
    </div>
  </div>
</aside>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quên mật khẩu', ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="page-forgot">

<div class="page">

  <!-- ═══════════ FIXED HEADER ═══════════ -->
  <header>
    <div class="header-inner">
      <a th:href="@{/}" class="logo" aria-label="Trang chủ ksh">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="#1E88E5"/>
          <path d="M16 7l8 4v6c0 4.4-3.4 7.2-8 8-4.6-.8-8-3.6-8-8v-6l8-4z" fill="#fff"/>
          <path d="M16 11l4 2-4 2-4-2 4-2z" fill="#1E88E5"/>
        </svg>
        ksh
      </a>
      <a th:href="@{/login}" class="btn-outlined">Đăng nhập</a>
    </div>
  </header>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <main>
    <div class="forgot-shell">
      <div class="forgot-grid">

        <!-- LEFT: form column -->
        <div class="forgot-col forgot-col-form">

          <!-- "Quay lại đăng nhập" tile -->
          <a th:href="@{/login}" class="forgot-back-link" aria-label="Quay lại đăng nhập">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M21 11H6.83l3.58-3.59L9 6l-6 6 6 6 1.41-1.41L6.83 13H21z"></path>
            </svg>
            Quay lại đăng nhập
          </a>

          <!-- FORM — always rendered; success feedback is delivered via KshToast
               (see CLAUDE.md mục 9 & 11: all top-level notifications use toast). -->
          <form class="forgot-form"
                th:action="@{/forgot-password}"
                method="post"
                th:object="${request}"
                novalidate>

            <h1 class="forgot-form__title">Tìm lại mật khẩu</h1>
            <p class="forgot-form__hint">
              Nhập email đã đăng ký, chúng tôi sẽ gửi liên kết đặt lại mật khẩu cho bạn.
            </p>

            <div class="field">
              <div class="input-wrap"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''">
                <input id="email"
                       name="email"
                       type="email"
                       th:field="*{email}"
                       placeholder="email@ksh.edu.vn"
                       autocomplete="email"
                       required
                       autofocus
                       th:attr="aria-invalid=${#fields.hasErrors('email')} ? 'true' : 'false',
                                aria-describedby=${#fields.hasErrors('email')} ? 'email-error' : null">
              </div>
              <p id="email-error"
                 th:if="${#fields.hasErrors('email')}"
                 class="forgot-error">
                Vui lòng nhập email hợp lệ
              </p>
            </div>

            <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;height:40px">
              Tiếp tục
            </button>
          </form>
        </div>

        <!-- RIGHT: illustration column -->
        <div class="forgot-col forgot-col-illus">
          <img class="forgot-illustration"
               th:src="@{/images/auth/reset-password-illustration.png}"
               alt="Minh họa đặt lại mật khẩu"
               width="689"
               height="630">
        </div>

      </div>
    </div>
  </main>

</div>

<!-- Flash data → toast (consumed by the inline script below). Convention:
     all top-level notifications use KshToast (see CLAUDE.md mục 9 & 11). -->
<div id="flash-data" hidden
     th:if="${flashError != null or flashSuccess != null}"
     th:attr="data-flash-error=${flashError},data-flash-success=${flashSuccess}"></div>

<!-- Shared toast helper (defines window.KshToast). -->
<script th:src="@{/js/app.js}"></script>

<!-- Flash → toast + submit loading state -->
<script th:inline="none">
  (function () {
    // Drain #flash-data into KshToast — defer to DOMContentLoaded to avoid
    // race with app.js loading (which defines window.KshToast).
    function drainFlash() {
      var fd = document.getElementById('flash-data');
      if (!fd || !window.KshToast) return;
      var ok = fd.getAttribute('data-flash-success');
      var err = fd.getAttribute('data-flash-error');
      if (ok) window.KshToast.success(ok);
      if (err) window.KshToast.error(err);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', drainFlash);
    } else {
      // DOM already parsed (script at end of body) — fire next tick to let
      // app.js finish executing.
      setTimeout(drainFlash, 0);
    }

    // Loading state for submit button — wire up after form exists.
    var form = document.querySelector('.forgot-form');
    if (!form) return;
    var btn = document.getElementById('submit-btn');
    var original = btn ? btn.innerHTML : '';
    form.addEventListener('submit', function () {
      if (!btn) return;
      btn.setAttribute('disabled', 'disabled');
      btn.innerHTML = 'Đang gửi...';
      // Re-enable after 8s as a safety net (in case server returns errors).
      setTimeout(function () {
        btn.removeAttribute('disabled');
        btn.innerHTML = original;
      }, 8000);
    });
  })();
</script>

</body>
</html>

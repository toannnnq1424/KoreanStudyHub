<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Audit Log – Admin</title>
  <th:block th:replace="~{fragments/admin-layout :: css}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/admin-layout :: sidebar('audit')}"></th:block>
<div class="main">
  <th:block th:replace="~{fragments/admin-layout :: topbar('📋 Audit Log')}"></th:block>
  <div class="content">
    <div class="card-box">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h6 class="fw-bold mb-0">Lịch sử hoạt động hệ thống</h6>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" style="width:150px">
            <option>Tất cả</option>
            <option>Đăng nhập</option>
            <option>Tạo người dùng</option>
            <option>Xóa người dùng</option>
            <option>Thay đổi quyền</option>
          </select>
          <input type="date" class="form-control form-control-sm" style="width:150px">
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Người thực hiện</th>
              <th>Hành động</th>
              <th>Đối tượng</th>
              <th>IP</th>
              <th>Kết quả</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="text-muted" style="font-size:0.85rem">14/06/2026 07:30</td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="avatar-sm" style="width:28px;height:28px;font-size:0.7rem">A</div>
                  <span style="font-size:0.9rem">admin@ksh.com</span>
                </div>
              </td>
              <td><span style="background:#eff6ff;color:#2563eb;font-size:0.78rem;padding:3px 8px;border-radius:6px;font-weight:600">ĐĂNG NHẬP</span></td>
              <td style="font-size:0.88rem; color:#374151">Hệ thống</td>
              <td style="font-size:0.85rem; color:#9ca3af">127.0.0.1</td>
              <td><span style="background:#f0fdf4;color:#16a34a;font-size:0.78rem;padding:3px 8px;border-radius:6px;font-weight:600">✓ Thành công</span></td>
            </tr>
            <tr>
              <td colspan="6" class="text-center text-muted py-4" style="font-size:0.9rem">
                <i class="bi bi-journal-text fs-3 d-block mb-2 opacity-25"></i>
                Tính năng audit log đang được phát triển
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${view.set().title()}, ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/practice/player.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/practice/player-writing.css}">
</head>
<body class="exam-shell writing-shell">
<form class="exam-player writing-player"
      th:action="@{/practice/attempts/{id}/submit(id=${attemptId})}"
      method="post"
      autocomplete="off"
      th:attr="data-mode=${mode},data-attempt-id=${attemptId},data-skill=${activeSectionSkill}">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

  <header class="exam-topbar">
    <a class="exam-icon-button" th:href="${returnUrl}" data-exit-link aria-label="Thoát bài" title="Thoát bài">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="exam-identity">
      <strong th:text="${view.set().title()}">Bộ đề luyện tập</strong>
      <span th:text="${activeSectionTitle}">Phần Viết</span>
    </div>
    <div class="exam-top-actions">
      <span class="exam-progress"><strong data-progress-done>0</strong>/<span th:text="${view.totalQuestions()}">2</span></span>
      <span class="exam-timer" th:attr="data-room-timer=${activeSectionDuration}">60:00</span>
      <button type="button" class="exam-icon-button" data-note-toggle aria-label="Mở ghi chú" title="Ghi chú">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16l4-4h10a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <span class="exam-note-count" data-note-count hidden>0</span>
      </button>
      <button class="exam-submit-button" type="submit">Nộp bài</button>
    </div>
  </header>

  <section class="exam-section-band writing-section-band">
    <div><span>WRITING</span><h1 th:text="${activeSectionTitle}">Phần Viết</h1></div>
    <p data-active-group-title>Writing Task</p>
  </section>

  <main class="writing-workspace" data-writing-workspace>
    <section class="writing-source-pane">
      <article class="writing-source-stage"
               th:each="g, gStat : ${view.groups()}"
               th:attr="data-group-stage=${gStat.index}">
        <div class="writing-task-label" th:text="${g.groupLabel() != null and !#strings.isEmpty(g.groupLabel()) ? g.groupLabel() : 'Writing Task ' + (gStat.index + 1)}">Writing Task 1</div>
        <p class="writing-instruction exam-selectable" th:if="${g.instruction() != null and !#strings.isEmpty(g.instruction())}"
           th:text="${g.instruction()}">Hướng dẫn</p>
        <div class="writing-passage exam-selectable" th:if="${g.passageText() != null and !#strings.isEmpty(g.passageText())}"
             th:text="${g.passageText()}">Nội dung nguồn</div>
        <figure class="writing-source-figure" th:if="${g.imageUrl() != null and !#strings.isEmpty(g.imageUrl())}">
          <img th:src="${g.imageUrl()}" alt="Ảnh đề Writing">
        </figure>

        <section class="writing-prompt-block" th:each="q : ${g.questions()}">
          <p class="exam-selectable" th:if="${q.prompt() != null and !#strings.isEmpty(q.prompt())}" th:text="${q.prompt()}">Đề bài</p>
          <figure th:if="${q.imageReference() != null and !#strings.isEmpty(q.imageReference())}">
            <img th:src="${q.imageReference()}" alt="Ảnh câu hỏi Writing">
          </figure>
          <div class="exam-audio compact" data-exam-audio
               th:if="${q.audioReference() != null and !#strings.isEmpty(q.audioReference())}">
            <button type="button" class="exam-audio-button" data-audio-toggle aria-label="Phát âm thanh câu hỏi">▶</button>
            <div class="exam-audio-track"><strong>Audio câu hỏi</strong><input type="range" min="0" max="1000" value="0" data-audio-range aria-label="Vị trí phát âm thanh"></div>
            <time data-audio-time>00:00 / 00:00</time>
            <audio th:src="${q.audioReference()}" preload="metadata" data-audio-source></audio>
          </div>
        </section>
      </article>
    </section>

    <div class="exam-resize-handle writing-divider" data-split-handle tabindex="0" role="separator"
         aria-label="Điều chỉnh độ rộng hai vùng" aria-orientation="vertical"
         aria-valuemin="32" aria-valuenow="50" aria-valuemax="68">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 8-4 4 4 4M15 8l4 4-4 4"/></svg>
    </div>

    <section class="writing-answer-pane">
      <article class="writing-answer-stage"
               th:each="g, gStat : ${view.groups()}"
               th:attr="data-group-stage=${gStat.index},data-group-label=${g.groupLabel()}"
               data-question-stage>
        <section class="writing-answer-block exam-question"
                 th:each="q : ${g.questions()}"
                 th:attr="data-question-id=${q.id()}">
          <div class="writing-answer-heading">
            <div><span th:text="'Câu ' + ${q.questionNo()}">Câu 1</span><h2>Câu trả lời</h2></div>
            <label class="exam-bookmark" title="Đánh dấu xem lại">
              <input type="checkbox" data-review-flag>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
            </label>
          </div>
          <div class="writing-editor" th:if="${q.questionType() == 'ESSAY'}">
            <textarea th:name="'answer_' + ${q.id()}" data-writing-answer
                      placeholder="Nhập bài viết tiếng Hàn" spellcheck="false"></textarea>
            <span data-answer-count>0 ký tự</span>
          </div>
          <div class="writing-short-answer" th:unless="${q.questionType() == 'ESSAY'}">
            <textarea th:name="'answer_' + ${q.id()}" data-writing-answer
                      placeholder="Nhập câu trả lời tiếng Hàn" spellcheck="false"></textarea>
            <span data-answer-count>0 ký tự</span>
          </div>
        </section>
      </article>
    </section>
  </main>

  <footer class="exam-bottom-bar">
    <nav class="exam-group-tabs" aria-label="Writing tasks">
      <button type="button" th:each="g, gStat : ${view.groups()}"
              th:attr="data-group-tab=${gStat.index}"
              th:text="${g.groupLabel() != null and !#strings.isEmpty(g.groupLabel()) ? g.groupLabel() : 'Task ' + (gStat.index + 1)}">Task 1</button>
    </nav>
    <div class="exam-bottom-actions">
      <button type="button" class="exam-nav-button" data-group-prev aria-label="Task trước">←</button>
      <button type="button" class="exam-nav-button" data-group-next aria-label="Task tiếp theo">→</button>
      <button type="submit" class="exam-bottom-submit">Nộp bài</button>
    </div>
  </footer>

  <aside class="exam-notes-drawer" data-notes-drawer aria-hidden="true">
    <header><h2>Ghi chú</h2><button type="button" data-note-close aria-label="Đóng ghi chú">×</button></header>
    <div class="exam-notes-list" data-notes-list></div>
    <p class="exam-notes-empty" data-notes-empty>Chưa có ghi chú.</p>
  </aside>
  <div class="exam-drawer-backdrop" data-note-backdrop></div>

  <div class="exam-selection-tools" data-selection-tools hidden>
    <button type="button" data-selection-highlight><span class="green-swatch"></span>Highlight</button>
    <button type="button" data-selection-note><span class="yellow-swatch"></span>Note</button>
    <div class="exam-note-composer" data-note-composer hidden>
      <input type="text" data-note-input maxlength="300" placeholder="Nhập ghi chú">
      <button type="button" data-note-save aria-label="Lưu ghi chú">✓</button>
    </div>
  </div>
</form>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/practice/player-exam.js}"></script>
</body>
</html>

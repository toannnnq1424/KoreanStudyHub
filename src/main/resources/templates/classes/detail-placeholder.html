<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${clazz.name} + ' | ' + ${placeholderLabel}, ~{::link.page-css})}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/app-shell.css}">
  <link class="page-css" rel="stylesheet" th:href="@{/css/class-detail.css}">
</head>
<body>
<header th:replace="~{fragments/app-header :: appHeader('classes')}"></header>

<div class="class-detail-layout">
  <aside th:replace="~{fragments/class-sidebar :: classSidebar(${clazz}, ${placeholderTab})}"></aside>

  <main class="col">
    <h1 class="detail-title" th:text="${placeholderLabel}">Tính năng</h1>
    <section class="detail-panel">
      <div class="tab-placeholder">
        <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h2 th:text="${placeholderLabel}">Tính năng</h2>
        <p>Tính năng này đang được phát triển và sẽ có trong các sprint tiếp theo.</p>
      </div>
    </section>
  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/class-detail.js}"></script>
</body>
</html>
